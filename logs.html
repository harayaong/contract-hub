<!-- 📋 Contract Hub: 기관 계약 관리 시스템 -->
<!-- logs.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 Contract Hub — 변경 로그</title>
<script src="common.js"></script>
</head>
<body>
<script> CH.injectStyle(); </script>

<style>
  .log-filter-row {
    display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
  }
  .log-search {
    flex: 1; min-width: 160px; max-width: 280px;
    padding: 9px 14px; border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 14px; outline: none;
    background: #f8fafc; font-family: inherit;
    transition: border-color 0.2s;
  }
  .log-search:focus { border-color: var(--primary-light); background: #fff; }
  .log-select {
    padding: 9px 12px; border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 14px; outline: none;
    background: #f8fafc; font-family: inherit;
    transition: border-color 0.2s;
  }
  .log-select:focus { border-color: var(--primary-light); background: #fff; }
  .log-count { font-size: 13px; color: var(--text-hint); margin-left: auto; white-space: nowrap; }
  .change-before { color: var(--text-hint); }
  .change-after  { color: var(--primary-light); font-weight: 600; }
  .arrow { color: var(--text-hint); margin: 0 4px; }
  @media (max-width: 768px) {
    .log-filter-row { gap: 8px; }
    .log-search { max-width: 100%; }
    th, td { padding: 8px 10px; font-size: 12px; }
  }
</style>

<!-- 사이드바 -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="icon">📋</div>
    <span>Contract Hub</span>
  </div>
  <nav class="sidebar-nav" id="sideNav"></nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" id="userAvatar"></div>
      <div>
        <div class="user-name" id="userName"></div>
        <div class="user-role" id="userRole"></div>
      </div>
    </div>
    <button class="logout-btn" onclick="CH.logout()">로그아웃</button>
  </div>
</div>

<!-- 모바일 하단 탭바 -->
<div class="bottombar">
  <div class="bottombar-inner" id="bottomNav"></div>
</div>

<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">변경 로그</div>
      <div class="topbar-sub">데이터 변경 이력을 확인합니다</div>
    </div>
  </div>
  <div class="content">

    <div class="card">
      <div class="card-header">
        <div class="card-title">변경 이력</div>
        <button class="btn btn-secondary btn-sm" onclick="loadLogs()">새로고침</button>
      </div>

      <div class="log-filter-row">
        <input class="log-search" id="log-search" placeholder="centerID 또는 처리자 검색" oninput="applyLogFilter()">
        <select class="log-select" id="log-sheet" onchange="applyLogFilter()">
          <option value="">전체 대상</option>
          <option>기관마스터</option>
          <option>계약정보</option>
          <option>교실정보</option>
        </select>
        <span class="log-count" id="log-count">0건</span>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>변경 일시</th>
              <th>처리자</th>
              <th>대상</th>
              <th>centerID</th>
              <th>siteID</th>
              <th>항목</th>
              <th>변경 내용</th>
            </tr>
          </thead>
          <tbody id="log-tbody">
            <tr><td colspan="7" class="empty">데이터 불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
if (!CH.requireAuth()) throw new Error('unauthorized');

// 지사 계정은 접근 불가
if (CH.role === 'branch') location.href = 'contract.html';

CH.renderNav('logs');

let logData = [];

loadLogs();

// ==============================
// 로그 로드
// ==============================
async function loadLogs() {
  document.getElementById('log-tbody').innerHTML =
    '<tr><td colspan="7" class="empty">데이터 불러오는 중...</td></tr>';

  try {
    const d = await CH.get({ action: 'getLogs' });
    if (!d.ok) throw new Error(d.error);
    logData = d.data;
    applyLogFilter();
  } catch(e) {
    document.getElementById('log-tbody').innerHTML =
      `<tr><td colspan="7" class="empty">오류: ${e.message}</td></tr>`;
  }
}

// ==============================
// 필터 적용
// ==============================
function applyLogFilter() {
  const q     = (document.getElementById('log-search')?.value || '').toLowerCase();
  const sheet = document.getElementById('log-sheet')?.value || '';

  const filtered = logData.filter(r => {
    const matchQ     = !q ||
      (r['centerID']  ||'').toLowerCase().includes(q) ||
      (r['처리자']    ||'').toLowerCase().includes(q) ||
      (r['변경항목']  ||'').toLowerCase().includes(q);
    const matchSheet = !sheet || r['대상시트'] === sheet;
    return matchQ && matchSheet;
  });

  document.getElementById('log-count').textContent = `${filtered.length}건`;

  const tb = document.getElementById('log-tbody');
  if (!filtered.length) {
    tb.innerHTML = '<tr><td colspan="7" class="empty">로그 없음</td></tr>';
    return;
  }

  tb.innerHTML = filtered.map(r => `
    <tr>
      <td style="white-space:nowrap;color:var(--text-hint)">${CH.fmtDate(r['변경일시'])}</td>
      <td><strong>${r['처리자']||''}</strong></td>
      <td>${r['대상시트']||''}</td>
      <td>
        ${r['centerID'] || r['기관ID'] || ''}
        ${r['centerID'] ? `<a href="detail.html?id=${encodeURIComponent(r['centerID'])}" style="font-size:11px;color:var(--primary-light);margin-left:4px">→</a>` : ''}
      </td>
      <td style="font-size:12px;color:var(--text-sub)">${r['siteID']||''}</td>
      <td style="font-size:12px">${r['변경항목']||''}</td>
      <td>
        <span class="change-before">${r['변경전값']||''}</span>
        ${r['변경전값'] && r['변경후값'] ? '<span class="arrow">→</span>' : ''}
        <span class="change-after">${r['변경후값']||''}</span>
      </td>
    </tr>
  `).join('');
}
</script>
</body>
</html>
