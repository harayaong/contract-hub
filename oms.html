<!-- 📋 Contract Hub: 기관 계약 관리 시스템 -->
<!-- oms.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 Contract Hub — OMS 동기화</title>
<script src="common.js"></script>
</head>
<body>
<script> CH.injectStyle(); </script>

<!-- 사이드바 -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="icon">📋</div>
    <span>Contract Hub</span>
  </div>
  <nav class="sidebar-nav" id="sideNav"></nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" id="userAvatar"></div>
      <div>
        <div class="user-name" id="userName"></div>
        <div class="user-role" id="userRole"></div>
      </div>
    </div>
    <button class="logout-btn" onclick="CH.logout()">로그아웃</button>
  </div>
</div>

<!-- 모바일 하단 탭바 -->
<div class="bottombar">
  <div class="bottombar-inner" id="bottomNav"></div>
</div>

<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">OMS 동기화</div>
      <div class="topbar-sub">영준님 JSON을 붙여넣어 교실 상태를 업데이트합니다</div>
    </div>
  </div>
  <div class="content">

    <div class="card">
      <div class="card-header">
        <div class="card-title">OMS JSON 입력</div>
      </div>

      <!-- 안내 -->
      <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:14px 16px;margin-bottom:20px;font-size:13px;color:#1e40af;line-height:1.6">
        영준님이 매일 오전 8:50 <code style="background:#dbeafe;padding:1px 6px;border-radius:4px">#C0AT3JN0GMQ</code> 채널에 올리는 JSON을 복사해서 아래에 붙여넣어 주세요.<br>
        저장하면 OMS_SITE_INFO 시트가 업데이트되고 교실 상태가 자동으로 동기화됩니다.
      </div>

      <div class="form-group full" style="margin-bottom:16px">
        <label>OMS JSON</label>
        <textarea id="omsJson" rows="12" placeholder='[{"siteID":"dgbom_1226","classroomServiceStatus":"ON",...}]' style="font-family:monospace;font-size:12px;line-height:1.5"></textarea>
      </div>

      <!-- JSON 미리보기 -->
      <div id="previewBox" style="display:none;background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:16px;">
        <div style="font-size:12px;font-weight:700;color:var(--text-sub);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px">파싱 미리보기</div>
        <div id="previewContent"></div>
      </div>

      <div class="btn-row">
        <button class="btn btn-secondary" onclick="previewJson()">미리보기</button>
        <button class="btn btn-primary" onclick="syncOms()">동기화 실행</button>
      </div>
    </div>

    <!-- 동기화 결과 -->
    <div class="card" id="resultCard" style="display:none">
      <div class="card-header">
        <div class="card-title">동기화 결과</div>
      </div>
      <div id="resultContent"></div>
    </div>

    <!-- 현재 OMS 상태 -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">현재 OMS 상태</div>
        <button class="btn btn-secondary btn-sm" onclick="loadOmsStatus()">새로고침</button>
      </div>
      <div style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap" id="statusSummary"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>siteID</th>
              <th>centerID</th>
              <th>OMS 상태</th>
              <th>서비스 요일</th>
              <th>스케줄</th>
            </tr>
          </thead>
          <tbody id="omsTbody">
            <tr><td colspan="5" class="empty">데이터 불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<style>
  .stat-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 99px;
    font-size: 12px; font-weight: 700;
  }
  .chip-on     { background: #d1fae5; color: #065f46; }
  .chip-off    { background: #fee2e2; color: #991b1b; }
  .chip-sanity { background: #fef3c7; color: #92400e; }
  .chip-etc    { background: #f1f5f9; color: #475569; }
</style>

<script>
if (!CH.requireAuth()) throw new Error('unauthorized');
if (CH.role === 'branch') location.href = 'contract.html';

// common.js에 oms 메뉴 추가
CH.MENUS.admin.push(   { id: 'oms', icon: '🔄', label: 'OMS 동기화', href: 'oms.html' });
CH.MENUS.bizteam.push( { id: 'oms', icon: '🔄', label: 'OMS 동기화', href: 'oms.html' });
CH.renderNav('oms');

loadOmsStatus();

// ==============================
// JSON 미리보기
// ==============================
function previewJson() {
  const raw = document.getElementById('omsJson').value.trim();
  if (!raw) { CH.showToast('JSON을 입력해주세요.'); return; }

  let parsed;
  try { parsed = JSON.parse(raw); }
  catch(e) { CH.showToast('JSON 형식 오류: ' + e.message); return; }

  const sites = Array.isArray(parsed) ? parsed : Object.values(parsed);
  const box   = document.getElementById('previewBox');
  const cont  = document.getElementById('previewContent');

  // 상태별 카운트
  const counts = {};
  sites.forEach(s => {
    const st = s.classroomServiceStatus || '알 수 없음';
    counts[st] = (counts[st] || 0) + 1;
  });

  cont.innerHTML = `
    <div style="font-size:13px;color:var(--text-sub);margin-bottom:8px">
      총 <strong style="color:var(--text)">${sites.length}개</strong> 교실
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:8px">
      ${Object.entries(counts).map(([st, cnt]) => `
        <span class="stat-chip ${chipClass(st)}">${st}: ${cnt}개</span>
      `).join('')}
    </div>
    <div style="margin-top:12px;font-size:12px;color:var(--text-hint)">
      첫 번째 항목: <code style="background:#f1f5f9;padding:1px 6px;border-radius:4px">${sites[0]?.siteID || '-'}</code>
    </div>
  `;
  box.style.display = 'block';
}

// ==============================
// OMS 동기화 실행
// ==============================
async function syncOms() {
  const raw = document.getElementById('omsJson').value.trim();
  if (!raw) { CH.showToast('JSON을 입력해주세요.'); return; }

  try { JSON.parse(raw); }
  catch(e) { CH.showToast('JSON 형식 오류: ' + e.message); return; }

  CH.showToast('동기화 중...', true);

  try {
    const result = await CH.post('syncOms', { json: raw });

    const card = document.getElementById('resultCard');
    const cont = document.getElementById('resultContent');
    card.style.display = 'block';

    if (result.ok) {
      cont.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;padding:16px;background:#d1fae5;border-radius:10px">
          <span style="font-size:20px">✅</span>
          <div>
            <div style="font-size:14px;font-weight:700;color:#065f46">동기화 완료</div>
            <div style="font-size:13px;color:#047857;margin-top:2px">${result.count}개 교실 OMS 데이터 업데이트됨</div>
          </div>
        </div>
      `;
      CH.showToast('동기화 완료!');
      loadOmsStatus();
    } else {
      cont.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;padding:16px;background:#fee2e2;border-radius:10px">
          <span style="font-size:20px">❌</span>
          <div style="font-size:14px;font-weight:700;color:#991b1b">오류: ${result.error || '알 수 없는 오류'}</div>
        </div>
      `;
      CH.showToast('동기화 오류');
    }
  } catch(e) {
    CH.showToast('서버 연결 오류');
  }
}

// ==============================
// 현재 OMS 상태 조회
// ==============================
async function loadOmsStatus() {
  try {
    const d = await CH.get({ action: 'getOmsStatus' });
    if (!d.ok) throw new Error(d.error);

    const data = d.data.filter(r => r['OMS_상태']);

    // 상태 요약
    const counts = {};
    data.forEach(r => {
      const st = r['OMS_상태'] || '-';
      counts[st] = (counts[st] || 0) + 1;
    });

    document.getElementById('statusSummary').innerHTML = Object.entries(counts)
      .map(([st, cnt]) => `<span class="stat-chip ${chipClass(st)}">${st}: ${cnt}개</span>`)
      .join('');

    // 테이블
    const tb = document.getElementById('omsTbody');
    if (!data.length) {
      tb.innerHTML = '<tr><td colspan="5" class="empty">OMS 데이터 없음 — 동기화를 먼저 실행해주세요</td></tr>';
      return;
    }

    tb.innerHTML = data.map(r => `
      <tr>
        <td><strong>${r['siteID']||''}</strong></td>
        <td>${r['centerID']||''}</td>
        <td>${CH.badgeStatus(r['OMS_상태'])}</td>
        <td style="color:var(--text-sub);font-size:12px">${r['OMS_서비스요일']||''}</td>
        <td style="color:var(--text-sub);font-size:12px">${r['OMS_스케줄']||''}</td>
      </tr>
    `).join('');

  } catch(e) {
    document.getElementById('omsTbody').innerHTML =
      `<tr><td colspan="5" class="empty">오류: ${e.message}</td></tr>`;
  }
}

function chipClass(status) {
  if (!status) return 'chip-etc';
  const s = String(status).toUpperCase();
  if (s === 'ON' || s === 'APPROVED') return 'chip-on';
  if (s === 'OFF')                    return 'chip-off';
  if (s.includes('SANITY'))           return 'chip-sanity';
  return 'chip-etc';
}
</script>
</body>
</html>
