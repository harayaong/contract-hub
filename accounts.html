<!-- 📋 Contract Hub: 기관 계약 관리 시스템 -->
<!-- accounts.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 Contract Hub — 계정 관리</title>
<script src="common.js"></script>
</head>
<body>
<script> CH.injectStyle(); </script>

<style>
  .account-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .account-table th {
    text-align: left; padding: 10px 12px;
    font-size: 11px; font-weight: 700; color: var(--text-sub);
    text-transform: uppercase; letter-spacing: 0.4px;
    border-bottom: 2px solid var(--border); background: #f8fafc;
  }
  .account-table td {
    padding: 12px; border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .account-table tr:last-child td { border-bottom: none; }
  .account-table tr.inactive td { opacity: 0.45; }

  .role-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 99px; }
  .role-admin   { background: #ede9fe; color: #5b21b6; }
  .role-bizteam { background: #dbeafe; color: #1e40af; }
  .role-branch  { background: #d1fae5; color: #065f46; }

  .active-dot   { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #10b981; margin-right: 4px; }
  .inactive-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #cbd5e1; margin-right: 4px; }

  .add-form { background: #f8fafc; border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; display: none; }
  .add-form-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 14px; }

  .pw-wrap { position: relative; }
  .pw-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 14px; color: var(--text-hint); }
</style>

<!-- 사이드바 -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="icon">📋</div>
    <span>Contract Hub</span>
  </div>
  <nav class="sidebar-nav" id="sideNav"></nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" id="userAvatar"></div>
      <div>
        <div class="user-name" id="userName"></div>
        <div class="user-role" id="userRole"></div>
      </div>
    </div>
    <button class="logout-btn" onclick="CH.logout()">로그아웃</button>
  </div>
</div>

<div class="bottombar">
  <div class="bottombar-inner" id="bottomNav"></div>
</div>

<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">계정 관리</div>
      <div class="topbar-sub">로그인 계정을 관리합니다 (admin 전용)</div>
    </div>
  </div>
  <div class="content">
    <div class="card">
      <div class="card-header">
        <div class="card-title">계정 목록</div>
        <button class="btn btn-primary btn-sm" onclick="toggleAddForm()">+ 계정 추가</button>
      </div>

      <!-- 계정 추가 폼 -->
      <div class="add-form" id="add-form">
        <div class="add-form-title">새 계정 추가</div>
        <div class="form-grid">
          <div class="form-group">
            <label>아이디 <span style="color:#ef4444">*</span></label>
            <input id="new-id" placeholder="영문/숫자">
          </div>
          <div class="form-group">
            <label>비밀번호 <span style="color:#ef4444">*</span></label>
            <div class="pw-wrap">
              <input id="new-pw" type="password" placeholder="비밀번호 입력">
              <button class="pw-toggle" onclick="togglePw('new-pw', this)">👁</button>
            </div>
          </div>
          <div class="form-group">
            <label>역할 <span style="color:#ef4444">*</span></label>
            <select id="new-role" onchange="onRoleChange('new')">
              <option value="">선택</option>
              <option value="admin">admin (본사 관리자)</option>
              <option value="bizteam">bizteam (본사 영업팀)</option>
              <option value="branch">branch (영업 지사)</option>
            </select>
          </div>
          <div class="form-group" id="new-branch-group" style="display:none">
            <label>담당 지사 <span style="color:#ef4444">*</span></label>
            <select id="new-branch">
              <option value="">선택</option>
            </select>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary btn-sm" onclick="toggleAddForm()">취소</button>
          <button class="btn btn-primary btn-sm" onclick="saveAccount()">저장</button>
        </div>
      </div>

      <!-- 계정 목록 테이블 -->
      <div class="table-wrap">
        <table class="account-table">
          <thead>
            <tr>
              <th>아이디</th>
              <th>역할</th>
              <th>담당지사</th>
              <th>상태</th>
              <th>비밀번호 변경</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="account-tbody">
            <tr><td colspan="6" class="empty">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
if (!CH.requireAuth()) throw new Error('unauthorized');
if (CH.role !== 'admin') { location.href = 'overview.html'; throw new Error('forbidden'); }
CH.renderNav('accounts');

let accountData = [];
let jisaList    = [];

loadAll();

async function loadAll() {
  try {
    const [accRes, jisaRes] = await Promise.all([
      CH.get({ action: 'getAccounts' }),
      CH.get({ action: 'getJisaList' }),
    ]);
    accountData = accRes.ok  ? accRes.data  : [];
    jisaList    = jisaRes.ok ? jisaRes.data : [];

    // 지사 드롭다운 채우기
    const branchSel = document.getElementById('new-branch');
    branchSel.innerHTML = '<option value="">선택</option>' +
      jisaList.map(j => `<option>${j}</option>`).join('');

    renderTable();
  } catch(e) {
    document.getElementById('account-tbody').innerHTML =
      `<tr><td colspan="6" class="empty">오류: ${e.message}</td></tr>`;
  }
}

// ==============================
// 테이블 렌더링
// ==============================
function renderTable() {
  const tbody = document.getElementById('account-tbody');
  if (!accountData.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">등록된 계정 없음</td></tr>';
    return;
  }

  tbody.innerHTML = accountData.map(a => {
    const isActive  = a['active'] !== 'N';
    const isMe      = a['id'] === CH.name;
    const roleCls   = { admin: 'role-admin', bizteam: 'role-bizteam', branch: 'role-branch' }[a['role']] || '';

    return `
      <tr class="${isActive ? '' : 'inactive'}">
        <td>
          <strong>${a['id']}</strong>
          ${isMe ? '<span style="font-size:10px;color:#3b82f6;margin-left:6px">(나)</span>' : ''}
        </td>
        <td><span class="role-badge ${roleCls}">${a['role']}</span></td>
        <td>${a['branch'] || '-'}</td>
        <td>
          <span class="${isActive ? 'active-dot' : 'inactive-dot'}"></span>
          ${isActive ? '활성' : '비활성'}
        </td>
        <td>
          <div style="display:flex;gap:6px;align-items:center">
            <div class="pw-wrap" style="flex:1;max-width:180px">
              <input id="pw-${a['id']}" type="password" placeholder="새 비밀번호"
                style="width:100%;padding:6px 30px 6px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px">
              <button class="pw-toggle" onclick="togglePw('pw-${a['id']}', this)">👁</button>
            </div>
            <button class="btn btn-secondary btn-sm" style="font-size:11px"
              onclick="changePw('${a['id']}')">변경</button>
          </div>
        </td>
        <td>
          ${!isMe ? `
            <button class="btn btn-secondary btn-sm" style="font-size:11px"
              onclick="toggleActive('${a['id']}')">
              ${isActive ? '비활성화' : '활성화'}
            </button>
          ` : '<span style="font-size:11px;color:var(--text-hint)">-</span>'}
        </td>
      </tr>
    `;
  }).join('');
}

// ==============================
// 추가 폼
// ==============================
function toggleAddForm() {
  const form = document.getElementById('add-form');
  form.style.display = form.style.display === 'none' ? '' : 'none';
  if (form.style.display === 'none') {
    document.getElementById('new-id').value   = '';
    document.getElementById('new-pw').value   = '';
    document.getElementById('new-role').value = '';
    document.getElementById('new-branch').value = '';
    document.getElementById('new-branch-group').style.display = 'none';
  }
}

function onRoleChange(prefix) {
  const role  = document.getElementById(`${prefix}-role`).value;
  const group = document.getElementById(`${prefix}-branch-group`);
  if (group) group.style.display = role === 'branch' ? '' : 'none';
}

async function saveAccount() {
  const id     = document.getElementById('new-id').value.trim();
  const pw     = document.getElementById('new-pw').value.trim();
  const role   = document.getElementById('new-role').value;
  const branch = document.getElementById('new-branch').value;

  if (!id)   { CH.showToast('아이디를 입력해주세요.');  return; }
  if (!pw)   { CH.showToast('비밀번호를 입력해주세요.'); return; }
  if (!role) { CH.showToast('역할을 선택해주세요.');    return; }
  if (role === 'branch' && !branch) { CH.showToast('담당 지사를 선택해주세요.'); return; }
  if (accountData.some(a => a['id'] === id)) { CH.showToast('이미 존재하는 아이디입니다.'); return; }

  CH.showToast('저장 중...', true);
  const result = await CH.post('saveAccount', { data: { id, pw, role, branch, active: 'Y' } });
  if (result.ok || result.duplicate) {
    CH.showToast('계정이 추가되었습니다.');
    toggleAddForm();
    await loadAll();
  } else {
    CH.showToast('오류: ' + (result.error || ''));
  }
}

// ==============================
// 비밀번호 변경
// ==============================
async function changePw(id) {
  const pw = document.getElementById(`pw-${id}`)?.value.trim();
  if (!pw) { CH.showToast('새 비밀번호를 입력해주세요.'); return; }

  const a = accountData.find(x => x['id'] === id);
  if (!a) return;

  CH.showToast('변경 중...', true);
  const result = await CH.post('saveAccount', {
    data: { id, pw, role: a['role'], branch: a['branch'], active: a['active'] }
  });
  if (result.ok || result.duplicate) {
    CH.showToast('비밀번호가 변경되었습니다.');
    document.getElementById(`pw-${id}`).value = '';
  } else {
    CH.showToast('오류: ' + (result.error || ''));
  }
}

// ==============================
// 활성/비활성 토글
// ==============================
async function toggleActive(id) {
  const result = await CH.post('toggleAccount', { id });
  if (result.ok) {
    CH.showToast(result.active === 'Y' ? '활성화되었습니다.' : '비활성화되었습니다.');
    await loadAll();
  } else {
    CH.showToast('오류: ' + (result.error || ''));
  }
}

// ==============================
// 비밀번호 표시/숨김
// ==============================
function togglePw(inputId, btn) {
  const input = document.getElementById(inputId);
  if (!input) return;
  input.type  = input.type === 'password' ? 'text' : 'password';
  btn.textContent = input.type === 'password' ? '👁' : '🙈';
}
</script>
</body>
</html>
