<!-- 📋 Contract Hub: 기관 계약 관리 시스템 -->
<!-- contract.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 Contract Hub — 계약 입력</title>
<script src="common.js"></script>
</head>
<body>
<script> CH.injectStyle(); </script>

<style>
  /* 섹션 구분 */
  .form-section {
    margin-bottom: 28px;
  }
  .form-section-title {
    font-size: 12px; font-weight: 700; color: var(--text-sub);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 14px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
  }
  .form-section-title span { font-size: 14px; }

  /* 임시ID 프리뷰 */
  .tmp-id-preview {
    font-size: 12px; color: #92400e;
    background: #fef3c7; padding: 5px 10px;
    border-radius: 6px; margin-top: 6px;
    display: none; font-weight: 600;
  }

  /* 계약종료일 자동계산 표시 */
  .auto-calc {
    font-size: 12px; color: #047857;
    background: #d1fae5; padding: 5px 10px;
    border-radius: 6px; margin-top: 6px;
    display: none; font-weight: 600;
  }

  /* 전화번호 포맷 힌트 */
  .field-hint {
    font-size: 11px; color: var(--text-hint); margin-top: 4px;
  }

  /* 플랜 선택 카드 */
  .plan-cards {
    display: flex; gap: 10px; margin-top: 4px;
  }
  .plan-card {
    flex: 1; padding: 14px; border: 2px solid var(--border);
    border-radius: 10px; cursor: pointer; text-align: center;
    transition: all 0.15s; background: var(--card);
  }
  .plan-card:hover { border-color: var(--primary-light); }
  .plan-card.selected {
    border-color: var(--primary);
    background: #eff6ff;
  }
  .plan-card-icon { font-size: 20px; margin-bottom: 4px; }
  .plan-card-name { font-size: 13px; font-weight: 700; color: var(--text); }
  .plan-card-desc { font-size: 11px; color: var(--text-hint); margin-top: 2px; }
  input[name="plan"] { display: none; }

  /* 고객표시명 동기 힌트 */
  .sync-hint {
    font-size: 11px; color: var(--text-hint); margin-top: 4px;
  }

  @media (max-width: 375px) {
    .form-group input, .form-group select, .form-group textarea { font-size: 16px; }
    .plan-cards { flex-direction: column; }
  }
</style>

<!-- 사이드바 -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="icon">📋</div>
    <span>Contract Hub</span>
  </div>
  <nav class="sidebar-nav" id="sideNav"></nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" id="userAvatar"></div>
      <div>
        <div class="user-name" id="userName"></div>
        <div class="user-role" id="userRole"></div>
      </div>
    </div>
    <button class="logout-btn" onclick="CH.logout()">로그아웃</button>
  </div>
</div>

<!-- 모바일 하단 탭바 -->
<div class="bottombar">
  <div class="bottombar-inner" id="bottomNav"></div>
</div>

<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">계약 입력</div>
      <div class="topbar-sub">신규 계약 기관 정보를 입력합니다</div>
    </div>
  </div>
  <div class="content">
    <div class="card">
      <div class="card-header">
        <div class="card-title">계약 정보 입력</div>
      </div>

      <!-- ① 기관 기본정보 -->
      <div class="form-section">
        <div class="form-section-title"><span>🏫</span> 기관 기본정보</div>
        <div class="form-grid">

          <div class="form-group full">
            <label>기관명 <span style="color:#ef4444">*</span></label>
            <input id="ct-기관명" placeholder="예: 파스텔어린이집" oninput="onInstNameInput()">
            <div class="tmp-id-preview" id="tmpIdPreview"></div>
          </div>

          <!-- 고객표시명: admin만 표시 -->
          <div class="form-group full" id="group-고객표시명" style="display:none">
            <label>고객 표시명</label>
            <input id="ct-고객표시명" placeholder="OMS·앱에 표시되는 이름 (미입력 시 기관명과 동일)">
            <div class="field-hint">admin만 입력 가능합니다</div>
          </div>

          <div class="form-group" id="jisa-group">
            <label>담당 지사 <span style="color:#ef4444">*</span></label>
            <select id="ct-담당지사">
              <option value="">불러오는 중...</option>
            </select>
          </div>

          <div class="form-group">
            <label>원장님 성함</label>
            <input id="ct-원장님성함" placeholder="홍길동">
          </div>

          <div class="form-group">
            <label>원장님 연락처 <span style="color:#ef4444">*</span></label>
            <input id="ct-원장님연락처" placeholder="010-0000-0000"
              oninput="formatPhone(this); checkTeacherPhone()" maxlength="13">
          </div>

          <div class="form-group">
            <label>대표교사 연락처 <span style="color:var(--text-hint);font-weight:400">(선택)</span></label>
            <input id="ct-대표교사연락처" placeholder="010-0000-0000"

      </div>

        <div class="form-grid">

          </div>

            <label>군구 <span style="color:#ef4444">*</span></label>
            <select id="ct-주소_군구" disabled>

        <div class="form-grid">

            <label>계약 일자 <span style="color:#ef4444">*</span></label>

            <label>교실 수 <span style="color:#ef4444">*</span></label>
            <input id="ct-교실수" type="number" min="1" placeholder="계약 시점 기준">
          </div>

        </div>

        <!-- 플랜 선택 -->

            </div>
            <div class="plan-card" id="plan-basic" onclick="selectPlan('베이직')">

        </div>

      <div class="btn-row">
        <button class="btn btn-secondary" onclick="resetForm()">초기화</button>

      </div>
    </div>
  </div>
</div>

// ==============================
// 페이지 초기화
// ==============================

  document.getElementById('jisa-group').style.display = 'none';
} else {

}

// admin만 고객표시명 / 계약시작일 표시

  document.getElementById('group-고객표시명').style.display = '';

  const startInput = document.getElementById('ct-계약시작일');

  startInput.style.background = '#f8fafc';

// 오늘 날짜를 계약일자 기본값으로
document.getElementById('ct-계약일자').value = new Date().toISOString().slice(0, 10);

// ==============================
// 지사 목록 동적 로드
// ==============================
async function loadJisaList() {
  const sel = document.getElementById('ct-담당지사');
  try {
    const res = await CH.get({ action: 'getJisaList' });
    if (res.ok && res.data.length) {
      sel.innerHTML = '<option value="">선택</option>' +
        res.data.map(j => `<option>${j}</option>`).join('');
    } else {
      sel.innerHTML = '<option value="">지사 없음</option>';
    }
  } catch(e) {
    sel.innerHTML = '<option value="">로드 실패</option>';
  }
}

// ==============================
// 기관명 입력 시
// ==============================
function onInstNameInput() {
  const 기관명  = document.getElementById('ct-기관명').value.trim();
  const preview = document.getElementById('tmpIdPreview');

  if (!기관명) {
    preview.style.display = 'none';
  } else {
    const cleaned   = 기관명.replace(/[^가-힣a-zA-Z0-9]/g, '');
    const romanized = cleaned.substring(0, 6).split('').map(c => {
      const code = c.charCodeAt(0);
      if (code >= 0xAC00 && code <= 0xD7A3) {
        const onset  = Math.floor((code - 0xAC00) / 28 / 21);
        const onsets = ['g','kk','n','d','tt','r','m','b','pp','s','','j','jj','ch','k','t','p','h'];
        return onsets[onset] || 'x';
      }
      return c.toLowerCase();
    }).join('');
    preview.textContent   = `임시ID 예시: tmp_${romanized || 'inst'}_****`;
    preview.style.display = 'block';
  }
}

// ==============================
// 상세주소 실시간 체크
// ==============================
function checkAddrDetail() {
  const val  = document.getElementById('ct-주소_상세').value.trim();
  const hint = document.getElementById('addrDetailHint');
  if (!val) {
    hint.textContent = '';
  } else if (val.length < 5) {
    hint.textContent = `${val.length}자 입력됨 — 5자 이상 입력해주세요`;
    hint.style.color = '#ef4444';
  } else {
    hint.textContent = '✓';
    hint.style.color = '#047857';
  }
}

// ==============================
// 대표교사 연락처 중복 체크
// ==============================
function checkTeacherPhone() {
  const p1   = document.getElementById('ct-원장님연락처').value.trim();
  const p2   = document.getElementById('ct-대표교사연락처').value.trim();
  const hint = document.getElementById('teacherPhoneHint');
  if (p2 && p1 && p1 === p2) {
    hint.textContent = '⚠️ 원장님 연락처와 동일합니다. 다른 번호를 입력해주세요.';
    hint.style.color = '#ef4444';
  } else if (p2) {
    hint.textContent = '✓';
    hint.style.color = '#047857';
  } else {
    hint.textContent = '';
  }
}

// ==============================
// 전화번호 자동 포맷
// ==============================
function formatPhone(input) {
  let v = input.value.replace(/\D/g, '');
  if (v.length <= 3)       input.value = v;
  else if (v.length <= 7)  input.value = v.slice(0,3) + '-' + v.slice(3);
  else                     input.value = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7,11);
}

// ==============================
// 시도 → 군구 연동
// ==============================
function onSidoChange() {
  const sido   = document.getElementById('ct-주소_시도').value;
  const gunguSel = document.getElementById('ct-주소_군구');

  if (!sido || !GUNGU[sido]) {
    gunguSel.innerHTML = '<option value="">시도 먼저 선택</option>';
    gunguSel.disabled  = true;
    return;
  }

  gunguSel.innerHTML = '<option value="">선택</option>' +
    GUNGU[sido].map(g => `<option>${g}</option>`).join('');
  gunguSel.disabled = false;
}

// ==============================
// 계약종료일 자동계산 (매년 2월 28일 고정)
// ==============================
function calcEndDate() {
  const startVal = document.getElementById('ct-계약시작일').value;
  const years    = parseInt(document.getElementById('ct-계약기간').value) || 3;
  const endInput = document.getElementById('ct-계약종료일');
  const hint     = document.getElementById('autoCalcHint');

  if (!startVal) {
    endInput.value     = '';
    hint.style.display = 'none';
    return;
  }

  // 계약시작일 기준으로 N년 후 2월 28일
  const start   = new Date(startVal);
  const endYear = start.getFullYear() + years;
  // 2월 28일 고정 (윤년 여부 무관)
  const endStr  = `${endYear}-02-28`;

  endInput.value     = endStr;
  hint.textContent   = `계약 종료일: ${endYear}년 2월 28일 (${years}년 계약 기준)`;
  hint.style.display = 'block';
}

// ==============================
// 플랜 선택
// ==============================
let selectedPlan = '';
function selectPlan(plan) {
  selectedPlan = plan;
  document.getElementById('plan-standard').classList.toggle('selected', plan === '스탠다드');
  document.getElementById('plan-basic').classList.toggle('selected', plan === '베이직');
}

// ==============================
// 유효성 검사
// ==============================
function validate() {
  const 기관명        = document.getElementById('ct-기관명').value.trim();
  const 계약일자      = document.getElementById('ct-계약일자').value;
  const 계약기간      = document.getElementById('ct-계약기간').value;
  const 계약시작일    = document.getElementById('ct-계약시작일').value;
  const 교실수        = document.getElementById('ct-교실수').value;
  const 주소_시도     = document.getElementById('ct-주소_시도').value;
  const 주소_군구     = document.getElementById('ct-주소_군구').value;
  const 주소_상세     = document.getElementById('ct-주소_상세').value.trim();
  const 원장님연락처  = document.getElementById('ct-원장님연락처').value.trim();
  const 대표교사연락처 = document.getElementById('ct-대표교사연락처').value.trim();
  const 담당지사      = CH.role === 'branch' ? CH.branch : document.getElementById('ct-담당지사').value;

  if (!기관명)     { CH.showToast('기관명을 입력해주세요.');           return false; }
  if (!담당지사)   { CH.showToast('담당 지사를 선택해주세요.');         return false; }
  if (!주소_시도)  { CH.showToast('주소 시도를 선택해주세요.');         return false; }
  if (!주소_군구)  { CH.showToast('주소 군구를 선택해주세요.');         return false; }
  if (!주소_상세)  { CH.showToast('상세 주소를 입력해주세요.');         return false; }
  if (주소_상세.length < 5) { CH.showToast('상세 주소는 5자 이상 입력해주세요.'); return false; }
  if (!원장님연락처) { CH.showToast('원장님 연락처를 입력해주세요.');   return false; }
  if (대표교사연락처 && 대표교사연락처 === 원장님연락처) {
    CH.showToast('대표교사 연락처가 원장님 연락처와 동일합니다.'); return false;
  }
  if (!계약일자)   { CH.showToast('계약 일자를 입력해주세요.');         return false; }
  // 계약기간은 3년으로 고정
  if (CH.role === 'admin' && !계약시작일) {
    CH.showToast('계약 시작일을 입력해주세요.'); return false;
  }
  if (!교실수 || parseInt(교실수) < 1) { CH.showToast('교실 수를 입력해주세요.'); return false; }
  if (!selectedPlan) { CH.showToast('플랜을 선택해주세요.');            return false; }
  return true;
}

// ==============================
// 저장
// ==============================
async function saveContract() {
  if (!validate()) return;

  const data = {
    기관명:          document.getElementById('ct-기관명').value.trim(),
    고객표시명:      CH.role === 'admin'
                      ? (document.getElementById('ct-고객표시명').value.trim() || document.getElementById('ct-기관명').value.trim())
                      : document.getElementById('ct-기관명').value.trim(),
    담당지사:        CH.role === 'branch' ? CH.branch : document.getElementById('ct-담당지사').value,
    원장님성함:      document.getElementById('ct-원장님성함').value.trim(),
    원장님연락처:    document.getElementById('ct-원장님연락처').value.trim(),
    대표교사연락처:  document.getElementById('ct-대표교사연락처').value.trim(),
    주소_시도:       document.getElementById('ct-주소_시도').value,
    주소_군구:       document.getElementById('ct-주소_군구').value,
    주소_상세:       document.getElementById('ct-주소_상세').value.trim(),
    계약일자:        document.getElementById('ct-계약일자').value,
    계약기간:        document.getElementById('ct-계약기간').value || '3',
    계약시작일:      CH.role === 'admin' ? document.getElementById('ct-계약시작일').value : '',
    계약종료일:      CH.role === 'admin' ? document.getElementById('ct-계약종료일').value : '',
    교실수:          document.getElementById('ct-교실수').value,
    플랜:            selectedPlan,
    비고:            document.getElementById('ct-비고').value.trim(),
  };

  CH.showToast('저장 중...', true);

  try {
    const result = await CH.post('saveContract', data);
    if (result.ok || result.duplicate) {
      CH.showToast('저장되었습니다.');
      if (result.centerID) {
        setTimeout(() => {
          location.href = `detail.html?id=${encodeURIComponent(result.centerID)}`;
        }, 800);
      }
    } else {
      CH.showToast('저장 오류: ' + (result.error || '알 수 없는 오류'));
    }
  } catch(e) {
    CH.showToast('서버 연결 오류');
  }
}

// ==============================
// 폼 초기화
// ==============================
function resetForm() {
  ['ct-기관명','ct-고객표시명','ct-원장님성함','ct-원장님연락처','ct-대표교사연락처',
   'ct-주소_상세','ct-계약기간','ct-계약시작일','ct-계약종료일',
   'ct-교실수','ct-비고'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });

  document.getElementById('ct-계약일자').value = new Date().toISOString().slice(0, 10);
  document.getElementById('ct-주소_시도').value = '';

  const gunguSel = document.getElementById('ct-주소_군구');
  gunguSel.innerHTML = '<option value="">시도 먼저 선택</option>';
  gunguSel.disabled  = true;

  if (CH.role !== 'branch') {
    document.getElementById('ct-담당지사').value = '';
  }

  document.getElementById('tmpIdPreview').style.display  = 'none';
  document.getElementById('autoCalcHint').style.display  = 'none';
  document.getElementById('addrDetailHint').textContent  = '';
  document.getElementById('teacherPhoneHint').textContent = '';

  selectedPlan = '';
  document.getElementById('plan-standard').classList.remove('selected');
  document.getElementById('plan-basic').classList.remove('selected');
}
</script>
