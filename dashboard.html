<!-- 📋 Contract Hub: 기관 계약 관리 시스템 -->
<!-- dashboard.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 Contract Hub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #1a3a6b;
    --primary-light: #2563eb;
    --sidebar-w: 220px;
    --header-h: 60px;
    --bottombar-h: 60px;
    --bg: #f0f4f8;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #0f172a;
    --text-sub: #64748b;
    --text-hint: #94a3b8;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* 사이드바 */
  .sidebar { position: fixed; top: 0; left: 0; width: var(--sidebar-w); height: 100vh; background: var(--primary); display: flex; flex-direction: column; z-index: 200; }
  .sidebar-logo { height: var(--header-h); display: flex; align-items: center; gap: 10px; padding: 0 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sidebar-logo .icon { width: 32px; height: 32px; background: rgba(255,255,255,0.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .sidebar-logo span { font-size: 15px; font-weight: 700; color: #fff; }
  .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.55); cursor: pointer; transition: all 0.15s; border: none; background: none; width: 100%; text-align: left; }
  .nav-item:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85); }
  .nav-item.active { background: rgba(255,255,255,0.15); color: #fff; }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.08); }
  .user-info { display: flex; align-items: center; gap: 10px; padding: 10px 12px; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .user-name { font-size: 13px; font-weight: 600; color: #fff; }
  .user-role { font-size: 11px; color: rgba(255,255,255,0.45); }
  .logout-btn { margin-top: 8px; width: 100%; padding: 8px; border-radius: 8px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.55); border: none; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .logout-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }

  /* 메인 */
  .main { margin-left: var(--sidebar-w); min-height: 100vh; display: flex; flex-direction: column; }
  .topbar { height: var(--header-h); background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; position: sticky; top: 0; z-index: 100; }
  .topbar-title { font-size: 16px; font-weight: 700; }
  .topbar-sub { font-size: 12px; color: var(--text-hint); margin-top: 1px; }
  .content { padding: 24px; flex: 1; }

  /* 섹션 */
  .section { display: none; }
  .section.active { display: block; }

  /* 카드 */
  .card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 24px; margin-bottom: 20px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .card-title { font-size: 15px; font-weight: 700; }

  /* 필터 */
  .filter-card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 20px; margin-bottom: 12px; }
  .filter-label { font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .pill-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill { padding: 6px 14px; border-radius: 99px; font-size: 13px; font-weight: 500; border: 1px solid var(--border); background: #f8fafc; color: var(--text-sub); cursor: pointer; transition: all 0.15s; }
  .pill:hover { border-color: var(--primary-light); color: var(--primary-light); }
  .pill.active { background: var(--primary); border-color: var(--primary); color: #fff; }
  .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .filter-result { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; }
  .filter-count { font-size: 13px; color: var(--text-sub); }
  .filter-count strong { color: var(--text); }
  .reset-btn { font-size: 13px; color: var(--text-hint); background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
  .reset-btn:hover { color: var(--text-sub); background: #f1f5f9; }

  /* 기관 카드 */
  .inst-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 16px; }
  .inst-card:hover { border-color: var(--primary-light); box-shadow: 0 2px 12px rgba(37,99,235,0.08); }
  .inst-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .inst-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .inst-meta { font-size: 12px; color: var(--text-hint); }
  .inst-stage-bar { display: flex; gap: 4px; align-items: center; margin-top: 8px; }
  .stage-pip { width: 20px; height: 6px; border-radius: 3px; background: var(--border); }
  .stage-pip.done { background: var(--primary); }
  .stage-pip.current { background: var(--primary-light); }
  .stage-pip.cancel { background: #fca5a5; }

  /* 뱃지 */
  .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; }
  .badge-on     { background: #d1fae5; color: #065f46; }
  .badge-off    { background: #fee2e2; color: #991b1b; }
  .badge-sanity { background: #fef3c7; color: #92400e; }
  .badge-etc    { background: #f1f5f9; color: #475569; }
  .stage-tag { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; white-space: nowrap; }
  .tag-1 { background: #fef3c7; color: #92400e; }
  .tag-2 { background: #dbeafe; color: #1e40af; }
  .tag-3 { background: #ede9fe; color: #5b21b6; }
  .tag-4 { background: #d1fae5; color: #065f46; }
  .tag-5 { background: #d1fae5; color: #065f46; }
  .tag-6 { background: #0f172a; color: #fff; }
  .tag-7 { background: #fee2e2; color: #991b1b; }
  .tag-tmp { background: #fef3c7; color: #92400e; font-size: 10px; padding: 2px 6px; border-radius: 4px; }

  /* 진행단계 바 */
  .stage-wrap { display: flex; align-items: center; gap: 0; margin-bottom: 24px; overflow-x: auto; padding-bottom: 4px; }
  .stage-item { display: flex; align-items: center; flex-shrink: 0; }
  .stage-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; border: 2px solid var(--border); background: var(--card); color: var(--text-hint); flex-shrink: 0; }
  .stage-dot.done { background: var(--primary); border-color: var(--primary); color: #fff; }
  .stage-dot.current { background: var(--primary-light); border-color: var(--primary-light); color: #fff; }
  .stage-dot.cancel { background: #ef4444; border-color: #ef4444; color: #fff; }
  .stage-label { font-size: 11px; color: var(--text-hint); margin: 0 6px; white-space: nowrap; }
  .stage-label.done { color: var(--primary); font-weight: 600; }
  .stage-label.current { color: var(--primary-light); font-weight: 700; }
  .stage-line { width: 24px; height: 2px; background: var(--border); flex-shrink: 0; }
  .stage-line.done { background: var(--primary); }

  /* 기관 상세 */
  .detail-back { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-sub); cursor: pointer; margin-bottom: 20px; background: none; border: none; font-family: inherit; }
  .detail-back:hover { color: var(--primary); }
  .confirm-id-box { background: #fffbeb; border: 1px solid #fcd34d; border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .confirm-id-box input { flex: 1; min-width: 140px; padding: 8px 12px; border: 1px solid #fcd34d; border-radius: 8px; font-size: 14px; outline: none; }
  .confirm-id-box input:focus { border-color: var(--primary-light); }

  /* 폼 */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input, .form-group select, .form-group textarea { padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; color: var(--text); background: #f8fafc; outline: none; transition: border-color 0.2s; font-family: inherit; }
  .form-group input:focus, .form-group select:focus { border-color: var(--primary-light); background: #fff; }
  .form-group input[readonly] { background: #f1f5f9; color: var(--text-hint); cursor: default; }
  .form-group textarea { resize: vertical; }
  .tmp-id-preview { font-size: 12px; color: #92400e; background: #fef3c7; padding: 4px 10px; border-radius: 6px; margin-top: 4px; display: none; }

  /* 버튼 */
  .btn { padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; transition: all 0.15s; font-family: inherit; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: #1e4080; }
  .btn-warn { background: #f59e0b; color: #fff; }
  .btn-warn:hover { background: #d97706; }
  .btn-secondary { background: #f1f5f9; color: var(--text-sub); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
  .btn-row { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }

  /* 검색 */
  .search-input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; background: #f8fafc; transition: border-color 0.2s; font-family: inherit; }
  .search-input:focus { border-color: var(--primary-light); background: #fff; }

  /* 테이블 */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.4px; background: #f8fafc; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 12px 14px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }

  /* 빈 상태 */
  .empty { text-align: center; padding: 48px 20px; color: var(--text-hint); font-size: 14px; }

  /* 토스트 */
  .toast { position: fixed; bottom: 24px; right: 24px; color: #fff; padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 500; display: none; z-index: 999; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }

  /* 모바일 */
  .bottombar { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottombar-h); background: var(--primary); z-index: 200; border-top: 1px solid rgba(255,255,255,0.1); }
  .bottombar-inner { display: flex; height: 100%; }
  .bottom-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; color: rgba(255,255,255,0.45); font-size: 10px; font-weight: 600; border: none; background: none; }
  .bottom-item.active { color: #fff; }
  .b-icon { font-size: 18px; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .bottombar { display: block; }
    .main { margin-left: 0; padding-bottom: var(--bottombar-h); }
    .topbar { padding: 0 16px; }
    .content { padding: 16px; }
    .form-grid { grid-template-columns: 1fr; }
    .filter-grid { grid-template-columns: 1fr; }
    .card { padding: 16px; border-radius: 12px; }
    .toast { bottom: calc(var(--bottombar-h) + 12px); right: 12px; left: 12px; }
    th, td { padding: 10px; }
  }
  @media (max-width: 375px) {
    .content { padding: 12px; }
    .card { padding: 14px; }
    .form-group input, .form-group select { font-size: 16px; }
    .pill { font-size: 12px; padding: 5px 10px; }
  }
</style>
</head>
<body>

<!-- 사이드바 -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="icon">📋</div>
    <span>Contract Hub</span>
  </div>
  <nav class="sidebar-nav" id="sideNav"></nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" id="userAvatar"></div>
      <div>
        <div class="user-name" id="userName"></div>
        <div class="user-role" id="userRole"></div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </div>
</div>

<!-- 모바일 하단 탭바 -->
<div class="bottombar">
  <div class="bottombar-inner" id="bottomNav"></div>
</div>

<!-- 메인 -->
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbarTitle"></div>
      <div class="topbar-sub" id="topbarSub"></div>
    </div>
  </div>
  <div class="content">

    <!-- 전체 현황 -->
    <div class="section" id="sec-overview">
      <div class="card">
        <div class="card-header"><div class="card-title">전체 기관 현황</div></div>
        <div class="search-input-wrap" style="margin-bottom:16px">
          <input class="search-input" id="ov-search" placeholder="기관명 또는 centerID 검색" oninput="applyFilters()">
        </div>
        <div id="ov-list"><div class="empty">데이터 불러오는 중...</div></div>
      </div>
    </div>

    <!-- 필터 -->
    <div class="section" id="sec-filter">

      <div class="filter-card">
        <div class="filter-label">검색</div>
        <input class="search-input" id="f-search" placeholder="기관명 또는 centerID" oninput="applyFilters()">
      </div>

      <div class="filter-card">
        <div class="filter-label">진행단계</div>
        <div class="pill-group" id="stagePills">
          <button class="pill active" data-stage="all" onclick="togglePill(this, 'stage')">전체</button>
          <button class="pill" data-stage="1" onclick="togglePill(this, 'stage')">계약</button>
          <button class="pill" data-stage="2" onclick="togglePill(this, 'stage')">Admin 등록</button>
          <button class="pill" data-stage="3" onclick="togglePill(this, 'stage')">siteID 부여</button>
          <button class="pill" data-stage="4" onclick="togglePill(this, 'stage')">설치 완료</button>
          <button class="pill" data-stage="5" onclick="togglePill(this, 'stage')">업로드 확인</button>
          <button class="pill" data-stage="6" onclick="togglePill(this, 'stage')">서비스 오픈</button>
          <button class="pill" data-stage="7" onclick="togglePill(this, 'stage')">취소</button>
        </div>
      </div>

      <div class="filter-grid">
        <div class="filter-card" style="margin-bottom:0">
          <div class="filter-label">담당지사</div>
          <select id="f-jisa" onchange="applyFilters()" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;background:#f8fafc;outline:none;font-family:inherit;">
            <option value="">전체</option>
          </select>
        </div>
        <div class="filter-card" style="margin-bottom:0">
          <div class="filter-label">시도</div>
          <select id="f-sido" onchange="applyFilters()" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;background:#f8fafc;outline:none;font-family:inherit;">
            <option value="">전체</option>
          </select>
        </div>
      </div>

      <div class="filter-card" style="margin-top:12px">
        <div class="filter-label">임시ID 여부</div>
        <div class="pill-group" id="tmpPills">
          <button class="pill active" data-tmp="all" onclick="togglePill(this, 'tmp')">전체</button>
          <button class="pill" data-tmp="Y" onclick="togglePill(this, 'tmp')">임시ID만</button>
          <button class="pill" data-tmp="N" onclick="togglePill(this, 'tmp')">확정ID만</button>
        </div>
      </div>

      <div class="filter-result">
        <span class="filter-count">필터 결과: <strong id="filterCount">0건</strong></span>
        <button class="reset-btn" onclick="resetFilters()">초기화</button>
      </div>

      <div id="filter-list"></div>
    </div>

    <!-- 기관 상세 -->
    <div class="section" id="sec-detail">
      <button class="detail-back" onclick="goBack()">← 목록으로</button>
      <div id="detail-content"></div>
    </div>

    <!-- 계약 입력 -->
    <div class="section" id="sec-contract">
      <div class="card">
        <div class="card-header"><div class="card-title">계약 정보 입력</div></div>
        <div class="form-grid">
          <div class="form-group full">
            <label>기관명 *</label>
            <input id="ct-기관명" placeholder="기관명 입력 시 임시ID 자동생성" oninput="previewTmpId()">
            <div class="tmp-id-preview" id="tmpIdPreview"></div>
          </div>
          <div class="form-group">
            <label>계약 일자</label>
            <input id="ct-계약일자" type="date">
          </div>
          <div class="form-group">
            <label>계약 시작일</label>
            <input id="ct-계약시작일" type="date">
          </div>
          <div class="form-group">
            <label>계약 종료일</label>
            <input id="ct-계약종료일" type="date">
          </div>
          <div class="form-group">
            <label>계약 기간</label>
            <select id="ct-계약기간">
              <option value="">선택</option>
              <option>6개월</option><option>12개월</option>
              <option>24개월</option><option>36개월</option>
            </select>
          </div>
          <div class="form-group">
            <label>부모님 서비스</label>
            <select id="ct-부모님서비스">
              <option value="">선택</option>
              <option>포함</option><option>미포함</option>
            </select>
          </div>
          <div class="form-group">
            <label>담당 지사</label>
            <select id="ct-담당지사">
              <option value="">선택</option>
              <option>한마음교육</option><option>뉴믹스에듀</option><option>동대구동심</option>
              <option>센스교육</option><option>한결교육</option><option>디렉토리</option>
              <option>5월5일</option><option>용인동심</option><option>즐거운교육</option>
              <option>세모에듀</option><option>(주)더바론에듀테인먼트</option><option>아이행복EDU</option>
              <option>문화사</option><option>전주동심</option><option>위드원에듀</option>
              <option>동심에드피아</option><option>POC</option><option>조이에듀</option>
              <option>다온시스템</option><option>오월오일</option><option>원주국민</option>
              <option>차일드</option><option>수원센스</option><option>한결교육 꿈드림</option>
            </select>
          </div>
          <div class="form-group">
            <label>주소 시도</label>
            <select id="ct-주소_시도">
              <option value="">선택</option>
              <option>서울</option><option>경기</option><option>인천</option>
              <option>부산</option><option>대구</option><option>광주</option>
              <option>대전</option><option>울산</option><option>세종</option>
              <option>강원</option><option>충북</option><option>충남</option>
              <option>전북</option><option>전남</option><option>경북</option>
              <option>경남</option><option>제주</option>
            </select>
          </div>
          <div class="form-group">
            <label>주소 상세</label>
            <input id="ct-주소_상세" placeholder="나머지 주소">
          </div>
          <div class="form-group">
            <label>원장님 성함</label>
            <input id="ct-원장님성함">
          </div>
          <div class="form-group">
            <label>원장님 연락처</label>

<script>

const TAB_META = {

const STAGE_LABELS = ['계약', 'Admin 등록', 'siteID 부여', '설치 완료', '업로드 확인', '서비스 오픈', '취소'];

menus.forEach(m => {

// ==============================
// 탭 전환
// ==============================
function switchTab(tab) {
  document.querySelectorAll('.nav-item, .bottom-item').forEach(t => t.classList.remove('active'));
  document.querySelectorAll(`[data-tab="${tab}"]`).forEach(t => t.classList.add('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + tab).classList.add('active');
  const meta = TAB_META[tab] || {};
  document.getElementById('topbarTitle').textContent = meta.title || '';
  document.getElementById('topbarSub').textContent   = meta.sub   || '';

  if (tab === 'overview' && !window._ovLoaded)  loadOverview();
  if (tab === 'filter'   && !window._ovLoaded)  loadOverview();
  if (tab === 'logs'     && !window._logLoaded) loadLogs();
}

function goBack() {
  const prev = window._prevTab || 'overview';
  switchTab(prev);
}

// ==============================
// 날짜 포맷
// ==============================
function fmtDate(val) {
  if (!val || val === '') return '';
  const d = new Date(val);
  if (isNaN(d.getTime())) return val;
  const kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
  const pad = n => String(n).padStart(2, '0');
  const yyyy = kst.getUTCFullYear();
  const mm   = pad(kst.getUTCMonth() + 1);
  const dd   = pad(kst.getUTCDate());
  const hh   = pad(kst.getUTCHours());
  const mi   = pad(kst.getUTCMinutes());
  const ss   = pad(kst.getUTCSeconds());
  if (hh === '00' && mi === '00' && ss === '00') return `${yyyy}-${mm}-${dd}`;
  return `${yyyy}-${mm}-${dd} ${hh}:${mi}:${ss}`;
}

// ==============================
// 전체 현황 + 필터 공용 데이터
// ==============================
let ovData = [];

async function loadOverview() {
  try {
    const r = await fetch(`${API}?action=getInstitutions&token=${token}`);
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    ovData = d.data;
    renderOverview(ovData);
    initFilterOptions();
    applyFilters();
    window._ovLoaded = true;
  } catch(e) { showToast('데이터 오류: ' + e.message); }
}

// 필터 드롭다운 옵션 동적 생성
function initFilterOptions() {
  const jisaSet = new Set();
  const sidoSet = new Set();
  ovData.forEach(r => {
    if (r['담당지사']) jisaSet.add(r['담당지사']);
    if (r['주소_시도']) sidoSet.add(r['주소_시도']);
  });

  const jisaSel = document.getElementById('f-jisa');
  jisaSel.innerHTML = '<option value="">전체</option>';
  [...jisaSet].sort().forEach(v => {
    const o = document.createElement('option');
    o.value = o.textContent = v;
    jisaSel.appendChild(o);
  });

  const sidoSel = document.getElementById('f-sido');
  sidoSel.innerHTML = '<option value="">전체</option>';
  [...sidoSet].sort().forEach(v => {
    const o = document.createElement('option');
    o.value = o.textContent = v;
    sidoSel.appendChild(o);
  });
}

// ==============================
// 전체 현황 렌더링
// ==============================
function renderOverview(data) {
  const el = document.getElementById('ov-list');
  if (!data.length) { el.innerHTML = '<div class="empty">등록된 기관이 없습니다</div>'; return; }
  el.innerHTML = data.map(r => instCardHTML(r)).join('');
}

function instCardHTML(r) {
  const stage  = parseInt(r['진행단계'] || '1');
  const isTmp  = r['임시ID여부'] === 'Y';
  const tagCls = `tag-${stage}`;
  const tagLabel = STAGE_LABELS[stage - 1] || '';

  const pips = STAGE_LABELS.map((_, i) => {
    const s = i + 1;
    let cls = '';
    if (stage === 7) cls = s <= 4 ? 'done' : 'cancel';
    else cls = s < stage ? 'done' : s === stage ? 'current' : '';
    return `<div class="stage-pip ${cls}"></div>`;
  }).join('');

  const tmpBadge = isTmp ? `<span class="tag-tmp">임시ID</span>` : '';

  return `
    <div class="inst-card" onclick="openDetail('${r['centerID']}')">
      <div style="flex:1;min-width:0">
        <div class="inst-name-row">
          <span class="inst-name">${r['기관명'] || r['centerID']}</span>
          ${tmpBadge}
        </div>
        <div class="inst-meta">${r['centerID']} · ${r['담당지사']||'-'} · ${r['주소_시도']||'-'}</div>
        <div class="inst-stage-bar">${pips}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
        <span class="stage-tag ${tagCls}">${tagLabel}</span>
        <span style="font-size:11px;color:var(--text-hint)">${fmtDate(r['등록일'])}</span>
      </div>
    </div>
  `;
}

// ==============================
// 필터
// ==============================
let activeStage = 'all';
let activeTmp   = 'all';

function togglePill(btn, group) {
  if (group === 'stage') {
    document.querySelectorAll('#stagePills .pill').forEach(b => b.classList.remove('active'));
    activeStage = btn.dataset.stage;
  } else {
    document.querySelectorAll('#tmpPills .pill').forEach(b => b.classList.remove('active'));
    activeTmp = btn.dataset.tmp;
  }
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q     = (document.getElementById('f-search')?.value || document.getElementById('ov-search')?.value || '').toLowerCase();
  const jisa  = document.getElementById('f-jisa')?.value  || '';
  const sido  = document.getElementById('f-sido')?.value  || '';

  const filtered = ovData.filter(r => {
    const matchQ     = !q || (r['기관명']||'').toLowerCase().includes(q) || (r['centerID']||'').toLowerCase().includes(q);
    const matchStage = activeStage === 'all' || r['진행단계'] === activeStage;
    const matchJisa  = !jisa || r['담당지사'] === jisa;
    const matchSido  = !sido || r['주소_시도'] === sido;
    const matchTmp   = activeTmp === 'all' || r['임시ID여부'] === activeTmp;
    return matchQ && matchStage && matchJisa && matchSido && matchTmp;
  });

  // 전체 현황 검색
  const ovSearch = document.getElementById('ov-search')?.value || '';
  if (ovSearch) {
    renderOverview(filtered);
  }

  // 필터 페이지 결과
  const countEl = document.getElementById('filterCount');
  if (countEl) countEl.textContent = `${filtered.length}건`;

  const listEl = document.getElementById('filter-list');
  if (listEl) {
    if (!filtered.length) {
      listEl.innerHTML = '<div class="empty">조건에 맞는 기관이 없습니다</div>';
    } else {
      listEl.innerHTML = filtered.map(r => instCardHTML(r)).join('');
    }
  }
}

function resetFilters() {
  document.getElementById('f-search').value = '';
  document.getElementById('f-jisa').value   = '';
  document.getElementById('f-sido').value   = '';
  activeStage = 'all';
  activeTmp   = 'all';
  document.querySelectorAll('#stageFields .pill, #stageFilter .pill, #stageField .pill').forEach(b => b.classList.remove('active'));
  document.querySelector('#stagePills .pill[data-stage="all"]')?.classList.add('active');
  document.querySelector('#tmpPills .pill[data-tmp="all"]')?.classList.add('active');
  applyFilters();
}

// ==============================
// 기관 상세
// ==============================
let currentInst = null;
let currentCls  = [];
let currentCt   = null;

async function openDetail(centerID) {
  window._prevTab = document.querySelector('.nav-item.active, .bottom-item.active')?.dataset?.tab || 'overview';
  currentInst = ovData.find(x => x['centerID'] === centerID) || null;

  const [clsRes, ctRes] = await Promise.all([
    fetch(`${API}?action=getClassrooms&token=${token}&기관ID=${centerID}`).then(r => r.json()),
    fetch(`${API}?action=getContracts&token=${token}&기관ID=${centerID}`).then(r => r.json()),
  ]);
  currentCls = clsRes.ok ? clsRes.data : [];
  currentCt  = ctRes.ok && ctRes.data.length ? ctRes.data[0] : null;

  renderDetail();
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-detail').classList.add('active');
  document.getElementById('topbarTitle').textContent = TAB_META.detail.title;
  document.getElementById('topbarSub').textContent   = TAB_META.detail.sub;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderDetail() {
  if (!currentInst) return;
  const inst  = currentInst;
  const stage = parseInt(inst['진행단계'] || '1');
  const isTmp = inst['임시ID여부'] === 'Y';

  const stageBar = STAGE_LABELS.map((label, i) => {
    const s = i + 1;
    let dotCls   = '';
    let labelCls = '';
    let lineCls  = '';
    if (stage === 7) {
      dotCls   = s <= 4 ? 'done' : s === 7 ? 'cancel' : '';
      labelCls = s <= 4 ? 'done' : s === 7 ? 'current' : '';
      lineCls  = s <= 4 ? 'done' : '';
    } else {
      dotCls   = s < stage ? 'done' : s === stage ? 'current' : '';
      labelCls = s < stage ? 'done' : s === stage ? 'current' : '';
      lineCls  = s < stage ? 'done' : '';
    }
    return `
      <div class="stage-item">
        <div class="stage-dot ${dotCls}">${s < stage && stage !== 7 ? '✓' : s}</div>
        <span class="stage-label ${labelCls}">${label}</span>
      </div>
      ${i < STAGE_LABELS.length - 1 ? `<div class="stage-line ${lineCls}"></div>` : ''}
    `;
  }).join('');

  const confirmBox = isTmp ? `
    <div class="confirm-id-box">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:#92400e;margin-bottom:4px">⚠️ 임시ID 사용 중 — siteID 확정 필요</div>
        <div style="font-size:12px;color:#92400e">현재: <strong>${inst['centerID']}</strong></div>
      </div>
      <input id="newSiteId" placeholder="실제 prefix 입력 (예: dgbom)" style="width:180px">
      <button class="btn btn-warn btn-sm" onclick="confirmSiteId('${inst['centerID']}')">확정</button>
    </div>
  ` : '';

  const clsRows = currentCls.length
    ? currentCls.map(c => `
      <tr>
        <td><strong>${c['siteID']||''}</strong></td>
        <td>${c['교실명']||''}</td>
        <td style="color:var(--text-sub)">${fmtDate(c['서비스시작일'])}</td>
        <td style="color:var(--text-sub)">${fmtDate(c['서비스종료일'])}</td>
        <td>${badgeStatus(c['OMS_상태'])}</td>
      </tr>
    `).join('')
    : '<tr><td colspan="5" class="empty">등록된 교실 없음</td></tr>';

  const ctSummary = currentCt ? `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px">
      <div><span style="color:var(--text-hint)">계약일자</span><br><strong>${fmtDate(currentCt['계약일자'])}</strong></div>
      <div><span style="color:var(--text-hint)">계약기간</span><br><strong>${currentCt['계약기간']||'-'}</strong></div>
      <div><span style="color:var(--text-hint)">계약시작일</span><br><strong>${fmtDate(currentCt['계약시작일'])}</strong></div>
      <div><span style="color:var(--text-hint)">계약종료일</span><br><strong>${fmtDate(currentCt['계약종료일'])}</strong></div>
      <div><span style="color:var(--text-hint)">부모님서비스</span><br><strong>${currentCt['부모님서비스']||'-'}</strong></div>
      <div><span style="color:var(--text-hint)">입력지사</span><br><strong>${currentCt['입력자지사']||'-'}</strong></div>
    </div>
  ` : '<div class="empty" style="padding:20px">계약 정보 없음</div>';

  const stageBtn = role !== 'branch' && stage < 6 ? `
    <button class="btn btn-primary btn-sm" onclick="advanceStage('${inst['centerID']}', ${stage + 1})">
      다음 단계 → ${STAGE_LABELS[stage] || ''}
    </button>
  ` : '';

  const tmpBadge = isTmp ? `<span class="tag-tmp" style="margin-left:8px">임시ID</span>` : '';

  document.getElementById('detail-content').innerHTML = `
    <div class="card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap">
        <div>
          <div style="font-size:20px;font-weight:800;display:flex;align-items:center;gap:8px">
            ${inst['기관명']||inst['centerID']}${tmpBadge}
          </div>
          <div style="font-size:13px;color:var(--text-hint);margin-top:4px">${inst['centerID']} · ${inst['담당지사']||'-'} · ${inst['주소_시도']||''} ${inst['주소_상세']||''}</div>
          <div style="font-size:13px;color:var(--text-hint);margin-top:2px">원장님: ${inst['원장님성함']||'-'} · ${inst['원장님연락처']||'-'}</div>
        </div>
        ${stageBtn}
      </div>
      ${confirmBox}
      <div class="stage-wrap">${stageBar}</div>
    </div>

    <div class="card">
      <div class="card-header"><div class="card-title">계약 정보</div></div>
      ${ctSummary}
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">교실 목록</div>
        ${role !== 'branch' ? `<button class="btn btn-secondary btn-sm" onclick="openAddClassroom('${inst['centerID']}')">+ 교실 추가</button>` : ''}
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>siteID</th><th>교실명</th><th>서비스 시작일</th><th>서비스 종료일</th><th>OMS 상태</th></tr></thead>
          <tbody>${clsRows}</tbody>
        </table>
      </div>
    </div>
  `;
}

// ==============================
// siteID 확정
// ==============================
async function confirmSiteId(oldId) {
  const newId = (document.getElementById('newSiteId')?.value || '').trim();
  if (!newId) { showToast('실제 prefix를 입력해주세요.'); return; }
  if (newId.startsWith('tmp_')) { showToast('tmp_ 로 시작하면 안돼요.'); return; }

  await postData('confirmSiteId', { oldId, newId }, null);
  const idx = ovData.findIndex(x => x['centerID'] === oldId);
  if (idx > -1) {
    ovData[idx]['centerID']    = newId;
    ovData[idx]['임시ID여부']  = 'N';
    ovData[idx]['진행단계']    = '3';
    currentInst = ovData[idx];
  }
  renderDetail();
  showToast('siteID가 확정되었습니다.');
}

// ==============================
// 단계 진행
// ==============================
async function advanceStage(centerID, newStage) {
  await postData('updateStage', { 기관ID: centerID, stage: newStage }, null);
  const idx = ovData.findIndex(x => x['centerID'] === centerID);
  if (idx > -1) {
    ovData[idx]['진행단계'] = String(newStage);
    currentInst = ovData[idx];
  }
  renderDetail();
  showToast(`${STAGE_LABELS[newStage - 1]} 단계로 업데이트됐습니다.`);
}

async function saveNewClassroom(centerID) {
  const siteID = (document.getElementById('add-siteID')?.value || '').trim();
  if (!siteID) { showToast('siteID는 필수입니다.'); return; }
  const data = {
    siteID,
    centerID,
    교실명:       (document.getElementById('add-교실명')?.value || '').trim(),
    서비스시작일: (document.getElementById('add-서비스시작일')?.value || '').trim(),
    서비스종료일: (document.getElementById('add-서비스종료일')?.value || '').trim(),
  };
  await postData('saveClassroom', data, null);
  currentCls.push(data);
  renderDetail();
}

// ==============================
// 계약 입력
// ==============================
function previewTmpId() {
  const 기관명  = document.getElementById('ct-기관명').value.trim();
  const preview = document.getElementById('tmpIdPreview');
  if (!기관명) { preview.style.display = 'none'; return; }
  const cleaned    = 기관명.replace(/[^가-힣a-zA-Z0-9]/g, '');
  const romanized  = cleaned.substring(0, 6).split('').map(c => {
    const code = c.charCodeAt(0);
    if (code >= 0xAC00 && code <= 0xD7A3) {
      const onset  = Math.floor((code - 0xAC00) / 28 / 21);
      const onsets = ['g','kk','n','d','tt','r','m','b','pp','s','','j','jj','ch','k','t','p','h'];
      return onsets[onset] || 'x';
    }
    return c.toLowerCase();
  }).join('');
  preview.textContent = `자동생성 임시ID: tmp_${romanized || 'inst'}_****`;
  preview.style.display = 'block';
}

async function saveContract() {
  const data = {};
  ['기관명','계약일자','계약시작일','계약종료일','계약기간','부모님서비스',
   '담당지사','주소_시도','주소_상세','원장님성함','원장님연락처','비고'].forEach(k => {
    const el = document.getElementById('ct-' + k);
    if (el) data[k] = el.value.trim();
  });
  if (!data['기관명']) { showToast('기관명은 필수입니다.'); return; }
  if (role === 'branch') data['담당지사'] = branch;

  await postData('saveContract', data, () => {
    resetContractForm();
    window._ovLoaded = false;
  });
}

function resetContractForm() {
  ['기관명','계약일자','계약시작일','계약종료일','계약기간','부모님서비스',
   '담당지사','주소_시도','주소_상세','원장님성함','원장님연락처','비고'].forEach(k => {
    const el = document.getElementById('ct-' + k);
    if (el) el.value = '';
  });
  const preview = document.getElementById('tmpIdPreview');
  if (preview) preview.style.display = 'none';
}

// ==============================
// 변경 로그
// ==============================
async function loadLogs() {
  try {
    const r = await fetch(`${API}?action=getLogs&token=${token}`);
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    const tb = document.getElementById('log-tbody');
    if (!d.data.length) { tb.innerHTML = '<tr><td colspan="7" class="empty">로그 없음</td></tr>'; return; }
    tb.innerHTML = d.data.map(r => `
      <tr>
        <td style="color:var(--text-hint);white-space:nowrap">${fmtDate(r['변경일시'])}</td>
        <td><strong>${r['처리자']||''}</strong></td>
        <td>${r['대상시트']||''}</td>
        <td>${r['centerID'] || r['기관ID']||''}</td>
        <td>${r['변경항목']||''}</td>
        <td style="color:var(--text-hint)">${r['변경전값']||''}</td>
        <td style="color:var(--primary-light);font-weight:600">${r['변경후값']||''}</td>
      </tr>
    `).join('');
    window._logLoaded = true;
  } catch(e) { showToast('로그 오류: ' + e.message); }
}

// ==============================
// 공통 저장
// ==============================
async function postData(action, data, onOptimistic) {
  const requestId = Date.now() + '_' + Math.random().toString(36).slice(2);
  if (onOptimistic) onOptimistic();
  showToast('저장 중...', true);
  try {
    const r = await fetch(API, {
      method: 'POST',
      body: JSON.stringify({ action, token, data, requestId })
    });
    const result = await r.json();
    if (result.ok || result.duplicate) { showToast('저장되었습니다.'); }
    else { showToast('저장 오류: ' + (result.error || '')); }
  } catch(e) { showToast('서버 연결 오류'); }
}

// ==============================
// 유틸
// ==============================
function badgeStatus(status) {
  if (!status) return '<span class="badge badge-etc">-</span>';
  const s = String(status).toUpperCase();
  if (s === 'ON' || s === 'APPROVED') return `<span class="badge badge-on">${status}</span>`;
  if (s === 'OFF') return `<span class="badge badge-off">${status}</span>`;
  if (s.includes('SANITY')) return `<span class="badge badge-sanity">${status}</span>`;
  return `<span class="badge badge-etc">${status}</span>`;
}

function showToast(msg, loading = false) {
  const t = document.getElementById('toast');
  t.textContent = loading ? '⏳ ' + msg : '✓ ' + msg;
  t.style.background = loading ? '#64748b' : '#0f172a';
  t.style.display = 'block';
  if (!loading) setTimeout(() => t.style.display = 'none', 2500);
}

function logout() { localStorage.clear(); location.href = 'index.html'; }
