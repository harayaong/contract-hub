<!-- 📋 Contract Hub: 기관 계약 관리 시스템 -->
<!-- dashboard.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 Contract Hub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #1a3a6b;
    --primary-light: #2563eb;
    --primary-pale: #eff6ff;
    --sidebar-w: 220px;
    --header-h: 60px;
    --bottombar-h: 60px;
    --bg: #f0f4f8;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #0f172a;
    --text-sub: #64748b;
    --text-hint: #94a3b8;
    --success-bg: #d1fae5; --success-text: #065f46;
    --warn-bg: #fef3c7;    --warn-text: #92400e;
    --danger-bg: #fee2e2;  --danger-text: #991b1b;
    --neutral-bg: #f1f5f9; --neutral-text: #475569;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── 사이드바 ── */
  .sidebar {
    position: fixed; top: 0; left: 0;
    width: var(--sidebar-w); height: 100vh;
    background: var(--primary);
    display: flex; flex-direction: column;
    z-index: 200;
  }
  .sidebar-logo {
    height: var(--header-h);
    display: flex; align-items: center; gap: 10px;
    padding: 0 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .sidebar-logo .icon {
    width: 32px; height: 32px;
    background: rgba(255,255,255,0.15);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .sidebar-logo span {
    font-size: 15px; font-weight: 700;
    color: #fff; letter-spacing: -0.2px;
  }
  .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px;
    font-size: 14px; font-weight: 500;
    color: rgba(255,255,255,0.55);
    cursor: pointer; transition: all 0.15s;
    border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85); }
  .nav-item.active { background: rgba(255,255,255,0.15); color: #fff; }
  .nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-footer {
    padding: 16px 12px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .user-info {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px;
  }
  .user-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .user-name { font-size: 13px; font-weight: 600; color: #fff; }
  .user-role { font-size: 11px; color: rgba(255,255,255,0.45); }
  .logout-btn {
    margin-top: 8px; width: 100%;
    padding: 8px; border-radius: 8px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.55);
    border: none; font-size: 13px; cursor: pointer;
    transition: all 0.15s;
  }
  .logout-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }

  /* ── 메인 영역 ── */
  .main {
    margin-left: var(--sidebar-w);
    min-height: 100vh;
    display: flex; flex-direction: column;
  }
  .topbar {
    height: var(--header-h);
    background: var(--card);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 24px;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .topbar-sub { font-size: 12px; color: var(--text-hint); margin-top: 1px; }

  .content { padding: 24px; flex: 1; }

  /* ── 섹션 ── */
  .section { display: none; }
  .section.active { display: block; }

  /* ── 카드 ── */
  .card {
    background: var(--card);
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 24px;
    margin-bottom: 20px;
  }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 15px; font-weight: 700; color: var(--text);
  }

  /* ── 폼 ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label {
    font-size: 11px; font-weight: 700;
    color: var(--text-sub);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    color: var(--text);
    background: #f8fafc;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    font-family: inherit;
  }
  .form-group input:focus,
  .form-group select:focus {
    border-color: var(--primary-light);
    background: #fff;
  }
  .form-group input[readonly] {
    background: #f1f5f9; color: var(--text-hint); cursor: default;
  }
  .form-group textarea { resize: vertical; }

  /* ── 버튼 ── */
  .btn {
    padding: 10px 20px; border-radius: 10px;
    font-size: 14px; font-weight: 700;
    cursor: pointer; border: none;
    transition: all 0.15s; font-family: inherit;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: #1e4080; }
  .btn-secondary {
    background: var(--neutral-bg); color: var(--text-sub);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
  .btn-row {
    display: flex; gap: 8px;
    margin-top: 20px; justify-content: flex-end;
  }

  /* ── 검색 ── */
  .search-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .search-input {
    padding: 9px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 14px; outline: none;
    flex: 1; max-width: 320px;
    background: #f8fafc;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--primary-light); background: #fff; }

  /* ── 테이블 ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    padding: 10px 14px; text-align: left;
    font-size: 11px; font-weight: 700;
    color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.4px;
    background: #f8fafc;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 12px 14px;
    border-bottom: 1px solid #f1f5f9;
    vertical-align: middle;
    color: var(--text);
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }

  /* ── 뱃지 ── */
  .badge {
    display: inline-flex; align-items: center;
    padding: 3px 10px; border-radius: 99px;
    font-size: 11px; font-weight: 700;
  }
  .badge-on     { background: var(--success-bg); color: var(--success-text); }
  .badge-off    { background: var(--danger-bg);  color: var(--danger-text); }
  .badge-sanity { background: var(--warn-bg);    color: var(--warn-text); }
  .badge-etc    { background: var(--neutral-bg); color: var(--neutral-text); }

  /* ── 로딩 / 빈 상태 ── */
  .empty { text-align: center; padding: 48px 20px; color: var(--text-hint); font-size: 14px; }

  /* ── 토스트 ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    color: #fff; padding: 12px 20px;
    border-radius: 12px; font-size: 14px; font-weight: 500;
    display: none; z-index: 999;
    transition: background 0.2s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }

  /* ── 모바일 하단 탭바 ── */
  .bottombar {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--bottombar-h);
    background: var(--primary);
    z-index: 200;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .bottombar-inner {
    display: flex; height: 100%;
  }
  .bottom-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px; cursor: pointer;
    color: rgba(255,255,255,0.45);
    font-size: 10px; font-weight: 600;
    border: none; background: none;
    transition: color 0.15s;
  }
  .bottom-item.active { color: #fff; }
  .bottom-item .b-icon { font-size: 18px; }

  /* ── 반응형 ── */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .bottombar { display: block; }
    .main {
      margin-left: 0;
      padding-bottom: var(--bottombar-h);
    }
    .topbar { padding: 0 16px; }
    .content { padding: 16px; }
    .form-grid { grid-template-columns: 1fr; }
    .card { padding: 16px; border-radius: 12px; }
    .toast { bottom: calc(var(--bottombar-h) + 12px); right: 12px; left: 12px; }
    .search-input { max-width: 100%; }
    th, td { padding: 10px 10px; }
  }

  @media (max-width: 375px) {
    .content { padding: 12px; }
    .card { padding: 14px; }
    .form-group input,
    .form-group select { font-size: 16px; }
  }
</style>
</head>
<body>

<!-- 사이드바 (데스크탑) -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="icon">📋</div>
    <span>Contract Hub</span>
  </div>
  <nav class="sidebar-nav">
    <button class="nav-item active" onclick="switchTab('institutions', this)" data-tab="institutions">
      <span class="nav-icon">🏫</span> 기관 관리
    </button>
    <button class="nav-item" onclick="switchTab('classrooms', this)" data-tab="classrooms">
      <span class="nav-icon">🚪</span> 교실 관리
    </button>
    <button class="nav-item" onclick="switchTab('contracts', this)" data-tab="contracts">
      <span class="nav-icon">📄</span> 계약 정보
    </button>
    <button class="nav-item" id="logNavItem" onclick="switchTab('logs', this)" data-tab="logs" style="display:none">
      <span class="nav-icon">🕓</span> 변경 로그
    </button>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" id="userAvatar"></div>
      <div>
        <div class="user-name" id="userName"></div>
        <div class="user-role" id="userRole"></div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </div>
</div>

<!-- 모바일 하단 탭바 -->
<div class="bottombar">
  <div class="bottombar-inner">
    <button class="bottom-item active" onclick="switchTab('institutions', this)" data-tab="institutions">
      <span class="b-icon">🏫</span>기관
    </button>
    <button class="bottom-item" onclick="switchTab('classrooms', this)" data-tab="classrooms">
      <span class="b-icon">🚪</span>교실
    </button>
    <button class="bottom-item" onclick="switchTab('contracts', this)" data-tab="contracts">
      <span class="b-icon">📄</span>계약
    </button>
    <button class="bottom-item" id="logBottomItem" onclick="switchTab('logs', this)" data-tab="logs" style="display:none">
      <span class="b-icon">🕓</span>로그
    </button>
  </div>
</div>

<!-- 메인 -->
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbarTitle">기관 관리</div>
      <div class="topbar-sub" id="topbarSub">기관 정보를 등록하고 관리합니다</div>
    </div>
  </div>

  <div class="content">

    <!-- 기관 관리 -->
    <div class="section active" id="sec-institutions">
      <div class="card">
        <div class="card-header">
          <div class="card-title">기관 등록 / 수정</div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>기관ID *</label>
            <input id="f-기관ID" placeholder="예: dgbom">
          </div>
          <div class="form-group">
            <label>기관명 *</label>
            <input id="f-기관명" placeholder="예: 동그라미봄 어린이집">
          </div>
          <div class="form-group">
            <label>고객표시명</label>
            <input id="f-고객표시명" placeholder="앱에 표시될 이름">
          </div>
          <div class="form-group">
            <label>업체명(총판)</label>
            <input id="f-업체명" placeholder="총판명">
          </div>
          <div class="form-group">
            <label>담당지사</label>
            <select id="f-담당지사">
              <option value="">선택</option>
              <option>한마음교육</option><option>뉴믹스에듀</option><option>동대구동심</option>
              <option>센스교육</option><option>한결교육</option><option>디렉토리</option>
              <option>5월5일</option><option>용인동심</option><option>즐거운교육</option>
              <option>세모에듀</option><option>(주)더바론에듀테인먼트</option><option>아이행복EDU</option>
              <option>문화사</option><option>전주동심</option><option>위드원에듀</option>
              <option>동심에드피아</option><option>POC</option><option>조이에듀</option>
              <option>다온시스템</option><option>오월오일</option><option>원주국민</option>
              <option>차일드</option><option>수원센스</option><option>한결교육 꿈드림</option>
            </select>
          </div>
          <div class="form-group">
            <label>주소 시도</label>
            <select id="f-주소_시도">
              <option value="">선택</option>
              <option>서울</option><option>경기</option><option>인천</option>
              <option>부산</option><option>대구</option><option>광주</option>
              <option>대전</option><option>울산</option><option>세종</option>
              <option>강원</option><option>충북</option><option>충남</option>
              <option>전북</option><option>전남</option><option>경북</option>
              <option>경남</option><option>제주</option>
            </select>
          </div>
          <div class="form-group">
            <label>주소 상세</label>
            <input id="f-주소_상세" placeholder="나머지 주소">
          </div>
          <div class="form-group">
            <label>원장님 성함</label>
            <input id="f-원장님성함">
          </div>
          <div class="form-group">
            <label>원장님 연락처</label>
            <input id="f-원장님연락처" placeholder="010-0000-0000">
          </div>
          <div class="form-group">
            <label>평균 원아수</label>
            <input id="f-평균원아수" type="number" placeholder="0">
          </div>
          <div class="form-group full">
            <label>비고</label>
            <textarea id="f-비고" rows="2"></textarea>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="resetInstitutionForm()">초기화</button>
          <button class="btn btn-primary" onclick="saveInstitution()">저장</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">기관 목록</div>
        </div>
        <div class="search-row">
          <input class="search-input" id="inst-search" placeholder="기관명 또는 기관ID 검색" oninput="filterInstitutions()">
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>기관ID</th><th>기관명</th><th>담당지사</th>
                <th>시도</th><th>원장님</th><th>연락처</th><th>등록일</th><th></th>
              </tr>
            </thead>
            <tbody id="inst-tbody">
              <tr><td colspan="8" class="empty">데이터 불러오는 중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 교실 관리 -->
    <div class="section" id="sec-classrooms">
      <div class="card">
        <div class="card-header">
          <div class="card-title">교실 등록 / 수정</div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>siteID *</label>
            <input id="fc-siteID" placeholder="예: dgbom_1226" oninput="autoFillGwanID()">
          </div>
          <div class="form-group">
            <label>기관ID (자동)</label>
            <input id="fc-기관ID" readonly>
          </div>
          <div class="form-group">
            <label>교실명</label>
            <input id="fc-교실명" placeholder="예: 장미반">
          </div>
          <div class="form-group">
            <label>서비스 시작일</label>
            <input id="fc-서비스시작일" type="date">
          </div>
          <div class="form-group">
            <label>서비스 종료일</label>
            <input id="fc-서비스종료일" type="date">
          </div>
          <div class="form-group">
            <label>설치 담당자</label>
            <input id="fc-설치담당자">
          </div>
          <div class="form-group">
            <label>설치 담당자 연락처</label>
            <input id="fc-설치담당자연락처" placeholder="010-0000-0000">
          </div>
          <div class="form-group">
            <label>설치 업체</label>
            <input id="fc-설치업체">
          </div>
          <div class="form-group">
            <label>사전 점검 일시</label>
            <input id="fc-사전점검일시" type="datetime-local">
          </div>
          <div class="form-group">
            <label>설치 확정 일시</label>
            <input id="fc-설치확정일시" type="datetime-local">
          </div>
          <div class="form-group">
            <label>비상대피도 수령</label>
            <select id="fc-비상대피도수령">
              <option value="">선택</option>
              <option>수령</option><option>미수령</option>
            </select>
          </div>
          <div class="form-group">
            <label>담당 선생님 연락처</label>
            <input id="fc-담당선생님연락처" placeholder="010-0000-0000">
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="resetClassroomForm()">초기화</button>
          <button class="btn btn-primary" onclick="saveClassroom()">저장</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">교실 목록</div>
        </div>
        <div class="search-row">
          <input class="search-input" id="cls-search" placeholder="siteID 또는 기관ID 검색" oninput="filterClassrooms()">
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>siteID</th><th>기관ID</th><th>교실명</th>
                <th>서비스 시작일</th><th>서비스 종료일</th>
                <th>OMS 상태</th><th>OMS 요일</th><th></th>
              </tr>
            </thead>
            <tbody id="cls-tbody">
              <tr><td colspan="8" class="empty">데이터 불러오는 중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 계약 정보 -->
    <div class="section" id="sec-contracts">
      <div class="card">
        <div class="card-header">
          <div class="card-title">계약 등록 / 수정</div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>기관ID *</label>
            <input id="fct-기관ID" placeholder="예: dgbom">
          </div>

function fmtDate(val) {
  if (!val || val === '') return '';
  const d = new Date(val);
  if (isNaN(d.getTime())) return val;
  const kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
  const pad = n => String(n).padStart(2, '0');
  const yyyy = kst.getUTCFullYear();
  const mm   = pad(kst.getUTCMonth() + 1);
  const dd   = pad(kst.getUTCDate());
  const hh   = pad(kst.getUTCHours());
  const mi   = pad(kst.getUTCMinutes());
  const ss   = pad(kst.getUTCSeconds());
  if (hh === '00' && mi === '00' && ss === '00') return `${yyyy}-${mm}-${dd}`;
  return `${yyyy}-${mm}-${dd} ${hh}:${mi}:${ss}`;
}

// ==============================
// 공통 저장
// ==============================
async function postData(action, data, onOptimistic) {
  const requestId = Date.now() + '_' + Math.random().toString(36).slice(2);
  if (onOptimistic) onOptimistic();
  showToast('저장 중...', true);
  try {
    const r = await fetch(API, {
      method: 'POST',
      body: JSON.stringify({ action, token, data, requestId })
    });
    const result = await r.json();
    if (result.ok || result.duplicate) { showToast('저장되었습니다.'); }
    else { showToast('저장 오류: ' + (result.error || '')); }
  } catch(e) { showToast('서버 연결 오류'); }
}

// ==============================
// 유틸
// ==============================
function badgeStatus(status) {
  if (!status) return '<span class="badge badge-etc">-</span>';
  const s = String(status).toUpperCase();
  if (s === 'ON' || s === 'APPROVED') return `<span class="badge badge-on">${status}</span>`;
  if (s === 'OFF') return `<span class="badge badge-off">${status}</span>`;
  if (s.includes('SANITY')) return `<span class="badge badge-sanity">${status}</span>`;
  return `<span class="badge badge-etc">${status}</span>`;
}

function showToast(msg, loading = false) {
  const t = document.getElementById('toast');
  t.textContent = loading ? '⏳ ' + msg : '✓ ' + msg;
  t.style.background = loading ? '#64748b' : '#0f172a';
  t.style.display = 'block';
  if (!loading) setTimeout(() => t.style.display = 'none', 2500);
}

function logout() {
