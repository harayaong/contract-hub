<!-- 📋 Contract Hub: 기관 계약 관리 시스템 -->
<!-- index.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 Contract Hub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a3a6b;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-wrap {
    width: 100%;
    max-width: 400px;
  }
  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-logo .icon {
    width: 56px;
    height: 56px;
    background: rgba(255,255,255,0.15);
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 12px;
  }
  .login-logo h1 {
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .login-logo p {
    color: rgba(255,255,255,0.55);
    font-size: 13px;
    margin-top: 4px;
  }
  .login-card {
    background: #fff;
    border-radius: 20px;
    padding: 32px;
  }
  .login-card h2 {
    font-size: 18px;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 24px;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #64748b;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    font-size: 15px;
    color: #0f172a;
    outline: none;
    transition: border-color 0.2s;
    background: #f8fafc;
  }
  .field input:focus {
    border-color: #2563eb;
    background: #fff;
  }
  .login-btn {
    width: 100%;
    padding: 14px;
    background: #1a3a6b;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
    letter-spacing: 0.2px;
  }
  .login-btn:hover { background: #1e4080; }
  .login-btn:disabled { background: #93afd4; cursor: not-allowed; }
  .error {
    font-size: 13px;
    color: #dc2626;
    text-align: center;
    margin-top: 12px;
    display: none;
  }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="icon">📋</div>
    <h1>Contract Hub</h1>
    <p>기관 계약 관리 시스템</p>
  </div>
  <div class="login-card">
    <h2>로그인</h2>
    <div class="field">
      <label>아이디</label>
      <input type="text" id="id" placeholder="아이디 입력" autocomplete="username">
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input type="password" id="pw" placeholder="비밀번호 입력" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn" onclick="login()">로그인</button>
    <div class="error" id="errMsg"></div>
  </div>
</div>
<script>
const API = 'https://script.google.com/macros/s/AKfycbx7SNtdVTDbe66mXwcU-Fc_rrZrsC1t4NLNKsyU1cOu8gQEFRlPEqr9-cRtwOsbq1tp9w/exec';

// 이미 로그인된 경우 역할에 따라 분기
if (localStorage.getItem('ch_token')) {
  const r = localStorage.getItem('ch_role');
  location.href = r === 'branch' ? 'contract.html' : 'filter.html';
}

document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

async function login() {
  const id  = document.getElementById('id').value.trim();
  const pw  = document.getElementById('pw').value.trim();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errMsg');
  if (!id || !pw) { showErr('아이디와 비밀번호를 입력해주세요.'); return; }
  btn.disabled = true; btn.textContent = '로그인 중...'; err.style.display = 'none';
  try {
    const r = await fetch(`${API}?action=login&id=${encodeURIComponent(id)}&pw=${encodeURIComponent(pw)}`);
    const data = await r.json();
    if (data.ok) {
      localStorage.setItem('ch_token', data.token);
      localStorage.setItem('ch_role',   data.role);
      localStorage.setItem('ch_branch', data.branch);
      localStorage.setItem('ch_name',   data.name);
      location.href = data.role === 'branch' ? 'contract.html' : 'filter.html';
    } else {
      showErr(data.error || '로그인 실패');
    }
  } catch(e) {
    showErr('서버 연결 오류. 잠시 후 다시 시도해주세요.');
  } finally {
    btn.disabled = false;
    btn.textContent = '로그인';
  }
}

function showErr(msg) {
  const e = document.getElementById('errMsg');
  e.textContent = msg;
  e.style.display = 'block';
}
</script>
</body>
</html>
