<!-- 📋 Contract Hub: 기관 계약 관리 시스템 -->
<!-- detail.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 Contract Hub — 기관 상세</title>
<script src="common.js"></script>
</head>
<body>
<script> CH.injectStyle(); </script>

<style>
  .detail-back { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-sub); cursor: pointer; margin-bottom: 20px; background: none; border: none; font-family: inherit; padding: 0; }
  .detail-back:hover { color: var(--primary); }
  .stage-wrap { display: flex; align-items: center; overflow-x: auto; padding-bottom: 4px; margin-bottom: 24px; }
  .stage-item { display: flex; align-items: center; flex-shrink: 0; }
  .stage-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; border: 2px solid var(--border); background: var(--card); color: var(--text-hint); flex-shrink: 0; }
  .stage-dot.done    { background: var(--primary);       border-color: var(--primary);       color: #fff; }
  .stage-dot.current { background: var(--primary-light); border-color: var(--primary-light); color: #fff; }
  .stage-dot.cancel  { background: #ef4444;              border-color: #ef4444;              color: #fff; }
  .stage-label { font-size: 11px; color: var(--text-hint); margin: 0 6px; white-space: nowrap; }
  .stage-label.done    { color: var(--primary);       font-weight: 600; }
  .stage-label.current { color: var(--primary-light); font-weight: 700; }
  .stage-line { width: 24px; height: 2px; background: var(--border); flex-shrink: 0; }
  .stage-line.done { background: var(--primary); }
  .confirm-id-box { background: #fffbeb; border: 1px solid #fcd34d; border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .confirm-id-box input { flex: 1; min-width: 140px; padding: 8px 12px; border: 1px solid #fcd34d; border-radius: 8px; font-size: 14px; outline: none; }
  .confirm-id-box input:focus { border-color: var(--primary-light); }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; font-size: 13px; }
  .info-item span:first-child { display: block; color: var(--text-hint); margin-bottom: 2px; }
  .info-item strong { color: var(--text); }
  .cls-form { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
  .tag-tmp { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; background: #fef3c7; color: #92400e; }
  .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; }
  .badge-on     { background: #d1fae5; color: #065f46; }
  .badge-off    { background: #fee2e2; color: #991b1b; }
  .badge-sanity { background: #fef3c7; color: #92400e; }
  .badge-etc    { background: #f1f5f9; color: #475569; }
  @media (max-width: 768px) {
    .info-grid { grid-template-columns: 1fr; }
  }

  /* 비고 섹션 */
  .memo-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .memo-item {
    background: #f8fafc; border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .memo-item:hover { border-color: var(--primary-light); }
  .memo-body { flex: 1; min-width: 0; }
  .memo-meta { font-size: 11px; color: var(--text-hint); margin-bottom: 4px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .memo-author { font-weight: 700; color: var(--text-sub); }
  .memo-text { font-size: 13px; color: var(--text); white-space: pre-wrap; word-break: break-all; }
  .memo-edit-area { width: 100%; font-size: 13px; border: 1.5px solid var(--primary-light); border-radius: 8px; padding: 8px 10px; font-family: inherit; resize: vertical; min-height: 60px; outline: none; }
  .memo-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .memo-btn { font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text-sub); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .memo-btn:hover { border-color: var(--primary-light); color: var(--primary); }
  .memo-btn.danger:hover { border-color: #fca5a5; color: #dc2626; }
  .memo-add-area { display: flex; gap: 8px; align-items: flex-end; }
  .memo-add-area textarea { flex: 1; font-size: 13px; border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 10px; font-family: inherit; resize: none; height: 60px; outline: none; transition: border-color 0.2s; }
  .memo-add-area textarea:focus { border-color: var(--primary-light); }
  .memo-empty { font-size: 13px; color: var(--text-hint); text-align: center; padding: 20px 0; }
</style>

<!-- 사이드바 -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="icon">📋</div>
    <span>Contract Hub</span>
  </div>
  <nav class="sidebar-nav" id="sideNav"></nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" id="userAvatar"></div>
      <div>
        <div class="user-name" id="userName"></div>
        <div class="user-role" id="userRole"></div>
      </div>
    </div>
    <button class="logout-btn" onclick="CH.logout()">로그아웃</button>
  </div>
</div>

<!-- 모바일 하단 탭바 -->
<div class="bottombar">
  <div class="bottombar-inner" id="bottomNav"></div>
</div>

<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">기관 상세</div>
      <div class="topbar-sub">기관 상세 정보 및 단계 관리</div>
    </div>
  </div>
  <div class="content">
    <button class="detail-back" onclick="history.back()">← 목록으로</button>
    <div id="detail-content"><div class="empty">데이터 불러오는 중...</div></div>
  </div>
</div>

<script>
if (!CH.requireAuth()) throw new Error('unauthorized');
CH.renderNav('');

const STAGE_LABELS = ['계약', 'Admin 등록', 'siteID 부여', '설치 완료', '업로드 확인', '서비스 오픈', '취소'];

const DAY_KO = {
  MONDAY: '월', TUESDAY: '화', WEDNESDAY: '수',
  THURSDAY: '목', FRIDAY: '금', SATURDAY: '토', SUNDAY: '일'
};
function fmtDays(raw) {
  if (!raw) return '';
  return raw.split(',').map(d => DAY_KO[d.trim()] || d.trim()).join('');
}

// URL 파라미터에서 centerID 추출
const params   = new URLSearchParams(location.search);
const centerID = params.get('id') || '';

if (!centerID) {
  document.getElementById('detail-content').innerHTML =
    '<div class="empty">기관 ID가 없습니다.</div>';
} else {
  loadDetail();
}

// ==============================
// 데이터 로드
// ==============================
let inst = null, clsData = [], ctData = null;

async function loadDetail() {
  try {
    const [instRes, clsRes, ctRes] = await Promise.all([
      CH.get({ action: 'getInstitutions' }),
      CH.get({ action: 'getClassrooms', centerID }),
      CH.get({ action: 'getContracts',  centerID }),
    ]);

    if (!instRes.ok) throw new Error(instRes.error);
    inst    = (instRes.data || []).find(x => x['centerID'] === centerID) || null;
    clsData = clsRes.ok  ? clsRes.data  : [];
    ctData  = ctRes.ok && ctRes.data.length ? ctRes.data[0] : null;

    if (!inst) {
      document.getElementById('detail-content').innerHTML =
        '<div class="empty">기관을 찾을 수 없습니다.</div>';
      return;
    }

    renderDetail();
  } catch(e) {
    document.getElementById('detail-content').innerHTML =
      `<div class="empty">오류: ${e.message}</div>`;
  }
}

// ==============================
// 상세 렌더링
// ==============================
function renderDetail() {
  const stage = parseInt(inst['진행단계'] || '1');
  const isTmp = inst['임시ID여부'] === 'Y';

  // 진행단계 바
  const stageBar = STAGE_LABELS.map((label, i) => {
    const s = i + 1;
    let dotCls = '', labelCls = '', lineCls = '';
    if (stage === 7) {
      dotCls   = s <= 4 ? 'done' : s === 7 ? 'cancel' : '';
      labelCls = s <= 4 ? 'done' : s === 7 ? 'current' : '';
      lineCls  = s <= 4 ? 'done' : '';
    } else {
      dotCls   = s < stage ? 'done' : s === stage ? 'current' : '';
      labelCls = s < stage ? 'done' : s === stage ? 'current' : '';
      lineCls  = s < stage ? 'done' : '';
    }
    return `
      <div class="stage-item">
        <div class="stage-dot ${dotCls}">${s < stage && stage !== 7 ? '✓' : s}</div>
        <span class="stage-label ${labelCls}">${label}</span>
      </div>
      ${i < STAGE_LABELS.length - 1 ? `<div class="stage-line ${lineCls}"></div>` : ''}
    `;
  }).join('');

  // 임시ID 확정 박스
  const confirmBox = isTmp ? `
    <div class="confirm-id-box">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:#92400e;margin-bottom:4px">⚠️ 임시ID 사용 중 — siteID 확정 필요</div>
        <div style="font-size:12px;color:#92400e">현재: <strong>${inst['centerID']}</strong></div>
      </div>
      <input id="newSiteId" placeholder="실제 prefix 입력 (예: dgbom)">
      <button class="btn btn-warn btn-sm" onclick="confirmSiteId()">확정</button>
    </div>
  ` : '';

  // 다음 단계 버튼
  const stageBtn = CH.role !== 'branch' && stage < 6 ? `
    <button class="btn btn-primary btn-sm" onclick="advanceStage(${stage + 1})">
      다음 단계 → ${STAGE_LABELS[stage] || ''}
    </button>
  ` : '';

  // 실제 운영 교실수 (활성 교실만 집계)
  const 활성교실수 = clsData.filter(c => c['교실상태'] !== '비활성').length;
  const 계약교실수 = ctData ? (ctData['교실수'] || '-') : '-';
  const 교실수차이 = ctData && 활성교실수 !== parseInt(계약교실수)
    ? `<span style="font-size:11px;color:#f59e0b;margin-left:6px">▲ 계약과 다름</span>` : '';

  // 계약 정보
  const ctHTML = ctData ? `
    <div class="info-grid">
      <div class="info-item"><span>계약일자</span><strong>${CH.fmtDate(ctData['계약일자'])}</strong></div>
      <div class="info-item"><span>계약기간</span><strong>${ctData['계약기간'] ? ctData['계약기간'] + '년' : '-'}</strong></div>
      <div class="info-item"><span>계약시작일</span><strong>${CH.fmtDate(ctData['계약시작일'])}</strong></div>
      <div class="info-item"><span>계약종료일</span><strong>${CH.fmtDate(ctData['계약종료일'])}</strong></div>
      <div class="info-item"><span>플랜</span><strong>${ctData['플랜']||'-'}</strong></div>
      <div class="info-item"><span>입력지사</span><strong>${ctData['입력자지사']||'-'}</strong></div>
      <div class="info-item">
        <span>계약 교실수</span>
        <strong>${계약교실수}개</strong>
      </div>
      <div class="info-item">
        <span>실제 운영 교실수</span>
        <strong style="display:inline-flex;align-items:center">${활성교실수}개${교실수차이}</strong>
      </div>
    </div>
  ` : '<div class="empty" style="padding:20px">계약 정보 없음</div>';

  // 교실 목록
  const clsRows = clsData.length ? clsData.map(c => `
    <tr>
      <td><strong>${c['siteID']||''}</strong></td>
      <td>${c['교실명']||''}</td>
      <td style="color:var(--text-sub)">${CH.fmtDate(c['서비스시작일'])}</td>
      <td style="color:var(--text-sub)">${CH.fmtDate(c['서비스종료일'])}</td>
      <td>${CH.badgeStatus(c['OMS_상태'] === 'APPROVED' ? 'ON' : c['OMS_상태'])}</td>
      <td style="font-size:12px;color:var(--text-sub)">${fmtDays(c['OMS_서비스요일'])}</td>
      <td style="font-size:12px;color:var(--text-sub)">${c['OMS_스케줄']||''}</td>
    </tr>
  `).join('') : '<tr><td colspan="7" class="empty">등록된 교실 없음</td></tr>';

  const tmpBadge = isTmp ? `<span class="tag-tmp" style="margin-left:8px">임시ID</span>` : '';

  document.getElementById('detail-content').innerHTML = `

    <!-- 기관 기본정보 -->
    <div class="card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap">
        <div>
          <div style="font-size:20px;font-weight:800;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            ${inst['기관명']||inst['centerID']}${tmpBadge}
            ${inst['고객표시명'] && inst['고객표시명'] !== inst['기관명']
              ? `<span style="font-size:13px;font-weight:400;color:var(--text-hint)">(${inst['고객표시명']})</span>` : ''}
          </div>
          <div style="font-size:13px;color:var(--text-hint);margin-top:4px">
            ${inst['centerID']} · ${inst['담당지사']||'-'} · ${inst['주소_시도']||''} ${inst['주소_군구']||''} ${inst['주소_상세']||''}
          </div>
          <div style="font-size:13px;color:var(--text-hint);margin-top:2px">
            원장님: ${inst['원장님성함']||'-'} · ${inst['원장님연락처']||'-'}
            ${inst['대표교사연락처'] ? ` · 대표교사: ${inst['대표교사연락처']}` : ''}
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-secondary btn-sm" onclick="toggleEditInst()">기관 정보 수정</button>
          ${stageBtn}
        </div>
      </div>
      ${confirmBox}
      <div class="stage-wrap">${stageBar}</div>

      <!-- 기관 정보 수정 폼 -->
      <div id="edit-inst-form" style="display:none;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
        <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px">🏫 기관 정보 수정</div>
        <div class="form-grid">
          <div class="form-group">
            <label>기관명</label>
            <input id="ei-기관명" value="${inst['기관명']||''}">
          </div>
          ${CH.role === 'admin' ? `
          <div class="form-group">
            <label>고객표시명 <span style="font-size:10px;color:var(--text-hint)">(admin 전용)</span></label>
            <input id="ei-고객표시명" value="${inst['고객표시명']||''}">
          </div>` : ''}
          ${CH.role === 'admin' ? `
          <div class="form-group">
            <label>담당지사 <span style="font-size:10px;color:var(--text-hint)">(admin 전용)</span></label>
            <select id="ei-담당지사">
              <option value="${inst['담당지사']||''}">${inst['담당지사']||'선택'}</option>
            </select>
          </div>` : `
          <div class="form-group">
            <label>담당지사</label>
            <input value="${inst['담당지사']||'-'}" readonly
              style="background:#f8fafc;color:var(--text-sub);cursor:not-allowed">
          </div>`}
          <div class="form-group">
            <label>주소 시도</label>
            <select id="ei-주소_시도" onchange="onEditSidoChange()">
              ${['서울','경기','인천','부산','대구','광주','대전','울산','세종','강원','충북','충남','전북','전남','경북','경남','제주']
                .map(s => `<option ${inst['주소_시도']===s?'selected':''}>${s}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>주소 군구</label>
            <select id="ei-주소_군구">
              <option value="${inst['주소_군구']||''}">${inst['주소_군구']||'-'}</option>
            </select>
          </div>
          <div class="form-group full">
            <label>상세 주소</label>
            <input id="ei-주소_상세" value="${inst['주소_상세']||''}">
          </div>
          <div class="form-group">
            <label>원장님 성함</label>
            <input id="ei-원장님성함" value="${inst['원장님성함']||''}">
          </div>
          <div class="form-group">
            <label>원장님 연락처</label>
            <input id="ei-원장님연락처" value="${inst['원장님연락처']||''}" oninput="formatPhone(this)" maxlength="13">
          </div>
          <div class="form-group">
            <label>대표교사 연락처</label>
            <input id="ei-대표교사연락처" value="${inst['대표교사연락처']||''}" oninput="formatPhone(this)" maxlength="13">
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary btn-sm" onclick="toggleEditInst()">취소</button>
          <button class="btn btn-primary btn-sm" onclick="saveInst()">저장</button>
        </div>
      </div>
    </div>

    <!-- 계약 정보 -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">계약 정보</div>
        ${CH.role !== 'branch' ? `<button class="btn btn-secondary btn-sm" onclick="toggleRenewForm()">계약 갱신/변경</button>` : ''}
      </div>
      ${ctHTML}

      <!-- 계약 갱신 폼 -->
      <div id="renew-form" style="display:none;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
        <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px">📄 새 계약 추가 (이력 누적)</div>
        <div class="form-grid">
          <div class="form-group">
            <label>계약일자 *</label>
            <input id="rn-계약일자" type="date" value="${new Date().toISOString().slice(0,10)}">
          </div>
          <div class="form-group">
            <label>계약기간 *</label>
            <select id="rn-계약기간" onchange="calcRenewEnd()">
              <option value="">선택</option>
              <option value="1">1년</option>
              <option value="2">2년</option>
              <option value="3">3년</option>
            </select>
          </div>
          <div class="form-group">
            <label>계약시작일 *</label>
            <input id="rn-계약시작일" type="date" onchange="calcRenewEnd()">
          </div>
          <div class="form-group">
            <label>계약종료일</label>
            <input id="rn-계약종료일" type="date" readonly style="background:#f8fafc;cursor:not-allowed">
          </div>
          <div class="form-group">
            <label>플랜 *</label>
            <select id="rn-플랜">
              <option value="">선택</option>
              <option value="스탠다드">스탠다드 (주5일)</option>
              <option value="베이직">베이직 (주3일)</option>
            </select>
          </div>
          <div class="form-group">
            <label>교실수 *</label>
            <input id="rn-교실수" type="number" min="1" placeholder="계약 교실수">
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary btn-sm" onclick="toggleRenewForm()">취소</button>
          <button class="btn btn-primary btn-sm" onclick="saveRenew()">저장</button>
        </div>
      </div>
    </div>

    <!-- 교실 목록 -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">교실 목록</div>
        ${CH.role !== 'branch' ? `<button class="btn btn-secondary btn-sm" onclick="toggleAddClassroom()">+ 교실 추가</button>` : ''}
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>siteID</th><th>교실명</th><th>서비스 시작일</th>
              <th>서비스 종료일</th><th>OMS 상태</th><th>서비스 요일</th><th>스케줄</th>
            </tr>
          </thead>
          <tbody id="cls-tbody">${clsRows}</tbody>
        </table>
      </div>

function formatPhone(input) {
  let v = input.value.replace(/\D/g, '');
  if (v.length <= 3)      input.value = v;
  else if (v.length <= 7) input.value = v.slice(0,3) + '-' + v.slice(3);
  else                    input.value = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7,11);
}

function calcRenewEnd() {
  const start = document.getElementById('rn-계약시작일')?.value;
  const years = document.getElementById('rn-계약기간')?.value;
  const endEl = document.getElementById('rn-계약종료일');
  if (!start || !years || !endEl) return;
  const d = new Date(start);
  d.setFullYear(d.getFullYear() + parseInt(years));
  d.setDate(d.getDate() - 1);
  endEl.value = d.toISOString().slice(0, 10);
}

// 비고 (메모) 관련 로직
// ==============================

// 비고는 JSON 배열 문자열로 기관마스터 비고 컬럼에 저장
// 형식: [{"ts":"2026-05-06 14:30","author":"admin","text":"내용"}, ...]

function parseMemos(raw) {
  if (!raw) return [];
  try {
    const parsed = JSON.parse(raw);
    if (Array.isArray(parsed)) return parsed;
  } catch(e) {}
  // 기존 단순 텍스트 비고가 있다면 첫 항목으로 마이그레이션
  if (raw.trim()) {
    return [{ ts: '', author: '(기존)', text: raw.trim() }];
  }
  return [];
}

function memoToRaw(memos) {
  return JSON.stringify(memos);
}

function nowStr() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

let memos = [];

function renderMemos() {
  memos = parseMemos(inst['비고'] || '');
  const el = document.getElementById('memo-list');
  if (!el) return;

  if (!memos.length) {
    el.innerHTML = '<div class="memo-empty">등록된 비고가 없습니다.</div>';
    return;
  }

  el.innerHTML = memos.map((m, i) => `
    <div class="memo-item" id="memo-item-${i}">
      <div class="memo-body">
        <div class="memo-meta">
          <span class="memo-author">${m.author || '-'}</span>
          ${m.ts ? `<span>${m.ts}</span>` : ''}
        </div>
        <div class="memo-text" id="memo-text-${i}">${escHtml(m.text)}</div>
        <textarea class="memo-edit-area" id="memo-edit-${i}" style="display:none">${escHtml(m.text)}</textarea>
      </div>
      <div class="memo-actions">
        <button class="memo-btn" id="memo-edit-btn-${i}" onclick="startEditMemo(${i})">수정</button>
        <button class="memo-btn" id="memo-save-btn-${i}" style="display:none" onclick="saveEditMemo(${i})">저장</button>
        <button class="memo-btn" id="memo-cancel-btn-${i}" style="display:none" onclick="cancelEditMemo(${i})">취소</button>
        <button class="memo-btn danger" onclick="deleteMemo(${i})">삭제</button>
      </div>
    </div>
  `).join('');
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function startEditMemo(i) {
  document.getElementById(`memo-text-${i}`).style.display = 'none';
  document.getElementById(`memo-edit-${i}`).style.display = '';
  document.getElementById(`memo-edit-btn-${i}`).style.display = 'none';
  document.getElementById(`memo-save-btn-${i}`).style.display = '';
  document.getElementById(`memo-cancel-btn-${i}`).style.display = '';
}

function cancelEditMemo(i) {
  document.getElementById(`memo-text-${i}`).style.display = '';
  document.getElementById(`memo-edit-${i}`).style.display = 'none';
  document.getElementById(`memo-edit-btn-${i}`).style.display = '';
  document.getElementById(`memo-save-btn-${i}`).style.display = 'none';
  document.getElementById(`memo-cancel-btn-${i}`).style.display = 'none';
}

async function saveEditMemo(i) {
  const newText = (document.getElementById(`memo-edit-${i}`)?.value || '').trim();
  if (!newText) { CH.showToast('내용을 입력해주세요.'); return; }

  memos[i] = { ...memos[i], text: newText, ts: memos[i].ts + ' (수정됨)' };
  await saveMemos();
}

async function deleteMemo(i) {
  if (!confirm('이 비고를 삭제하시겠습니까?')) return;
  memos.splice(i, 1);
  await saveMemos();
}

async function addMemo() {
  const text = (document.getElementById('memo-input')?.value || '').trim();
  if (!text) { CH.showToast('내용을 입력해주세요.'); return; }

  const newMemo = {
    ts:     nowStr(),
    author: CH.name || CH.role || '-',
    text,
  };
  memos.push(newMemo);
  await saveMemos();
  document.getElementById('memo-input').value = '';
}

async function saveMemos() {
  const raw = memoToRaw(memos);
  inst['비고'] = raw;

  // saveInstitution API로 비고만 업데이트
  const data = {
    centerID:      inst['centerID'],
    기관명:        inst['기관명'],
    고객표시명:    inst['고객표시명'],
    담당지사:      inst['담당지사'],
    주소_시도:     inst['주소_시도'],
    주소_군구:     inst['주소_군구'],
    주소_상세:     inst['주소_상세'],
    원장님성함:    inst['원장님성함'],
    원장님연락처:  inst['원장님연락처'],
    대표교사연락처: inst['대표교사연락처'],
    비고:          raw,
    임시ID여부:    inst['임시ID여부'],
    진행단계:      inst['진행단계'],
    등록일:        inst['등록일'],
  };

  CH.showToast('저장 중...', true);
  const result = await CH.post('saveInstitution', data);
  if (result.ok || result.duplicate) {
    CH.showToast('비고가 저장되었습니다.');
    renderMemos();
  } else {
    CH.showToast('오류: ' + (result.error || ''));
    // 실패 시 롤백
    memos = parseMemos(inst['비고']);
    renderMemos();
  }
}
</script>
